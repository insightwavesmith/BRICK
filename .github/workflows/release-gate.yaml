name: release-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Node for dashboard build
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: support/dashboard/package-lock.json

      - name: Install dependencies
        run: uv sync --locked

      - name: Run release gate (compileall, check_profile, brick verify --self-test, dashboard build, release_export negative probe, clean-boundary output scan, release_product_manifest negative probe leak-scan dry-run only)
        run: sh support/onboarding/release_gate.sh
