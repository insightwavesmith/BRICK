schema: checker-profile/v1
profile_id: sink-registry
description: Fixture-only sink registry persistence, reachability checks, and standalone CLI dispatch guard.
kernel_checks:
  - sink_registry
path_exists:
  - brick_protocol/support/operator/sink_registry.py
  - brick_protocol/support/operator/onboard.py
  - brick_protocol/support/operator/cli.py
  - brick_protocol/support/checkers/check_sink_registry.py
  - brick_protocol/support/checkers/profiles/sink_registry.yaml
text_contains:
  - path: brick_protocol/support/checkers/check_sink_registry.py
    texts:
      - 'tempfile.TemporaryDirectory(prefix="bp-sink-registry-")'
      - 'os.environ["BRICK_HOME"] = tmp'
      - '_fake_slack_call'
      - '_fake_dashboard_unreachable'
      - 'brick sink add dashboard'
  - path: brick_protocol/support/operator/sink_registry.py
    texts:
      - 'SINKS_FILENAME = "sinks.yaml"'
      - 'record_sink_reachability'
      - 'last_reachability_check'
      - 'registry_path.chmod(0o600)'
  - path: brick_protocol/support/operator/onboard.py
    texts:
      - 'def run_dashboard_provision_step'
      - 'chat.postMessage'
      - 'BRICK_DASHBOARD_INGEST_URL'
      - 'record_sink_reachability'
  - path: brick_protocol/support/operator/cli.py
    texts:
      - 'provider_add.add_argument("host"'
      - 'sink_add.add_argument("sink_name"'
      - 'run_dashboard_provision_step'
text_absent:
  - path: brick_protocol/support/checkers/check_sink_registry.py
    texts:
      - 'Path.home() / ".brick"'
      - 'urllib.request.urlopen'
proof_limits:
  - support evidence only
  - fixture-only sink registry checker
  - mocked Slack and Dashboard reachability
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - real Slack API delivery, dashboard ingest reachability, or webhook persistence
  - persistence behavior in a live user BRICK_HOME or ~/.brick directory
  - credential validity, external network behavior, or notification reliability
  - source truth
  - success judgment
  - quality judgment
  - Movement authority
