schema: checker-profile/v1
profile_id: return-field-merge-set-parity
description: F1 coverage-gap regression pin (return-LANDING binds to the brick contract). Every field in the structured-return merge-set ({evidence_refs, not_proven, proof_limits} inside _merge_structured_return_fields in brick_protocol/support/connection/adapter_grant_policy.py) MUST also be in _RETURN_LIST_FIELDS (brick_protocol/support/connection/agent_adapter.py) so the return normalizer list-normalizes and dict-flattens it before _merge_texts. A merge-set field absent from the list-set (exactly how evidence_refs failed F1) lets an agent return that field as a bare Mapping and crashes the adapter return-assembly BEFORE the AgentFact is written, so the step records zero evidence. Both adapter paths (adapter_local_cli + adapter_gemini_http) call the same merge function, so one pin covers both. Fails closed.
kernel_checks:
  - return_field_merge_set_parity
path_exists:
  - brick_protocol/support/connection/agent_adapter.py
  - brick_protocol/support/connection/adapter_grant_policy.py
  - brick_protocol/support/checkers/check_return_field_merge_set_parity.py
  - brick_protocol/support/checkers/profiles/return_field_merge_set_parity.yaml
text_contains:
  - path: brick_protocol/support/connection/agent_adapter.py
    texts:
      - _RETURN_LIST_FIELDS
      - '"evidence_refs"'
  - path: brick_protocol/support/connection/adapter_grant_policy.py
    texts:
      - def _merge_structured_return_fields
      - '{"evidence_refs", "not_proven", "proof_limits"}'
      - def _mapping_to_text_list
  - path: brick_protocol/support/checkers/check_return_field_merge_set_parity.py
    texts:
      - _list_fields_members
      - _merge_set_members
      - mutation RED observed
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
  - not provider proof
not_proven:
  - the runtime correctness of the merge or the agent's returned content
  - that an agent returns the merge-set fields in any particular shape
