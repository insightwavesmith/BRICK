profile_id: building-automation
description: Building automation support profile over accumulated Building evidence.
kernel_checks:
  - building_lifecycle_path_shape
  - building_map_graph
  - chat_session_park_seam
  - adapter_error_frontier_manifest_consistency
  - adapter_error_path_hardening
  - resume_disposition_surface
  - resume_replay_disposition_mirror
path_exists:
  - brick_protocol/support/operator/run.py
  - brick_protocol/support/checkers/check_resume_replay_disposition_mirror.py
  - brick_protocol/support/checkers/check_resume_admission_single_source.py
  - brick_protocol/agent/performance.py
  - brick_protocol/support/connection/agent_adapter.py
  - brick_protocol/support/connection/agent_resources.py
  - brick_protocol/support/checkers/check_profile.py
  - brick_protocol/support/checkers/check_building_lifecycle_path_shape.py
  - brick_protocol/support/checkers/check_building_map_graph.py
  - brick_protocol/brick/templates/tasks/source-template.md
path_absent:
  - brick_protocol/support/run.py
  - brick_protocol/support/recording/__main__.py
  - brick_protocol/brick/tasks
path_absent_glob:
  - brick_protocol/support/runner/**
  - brick_protocol/support/building_run/**
# CLEAN-YARD v3 (Smith 0611): the standing 0526/0527 dogfood evidence left
# for the frozen museum. The task-placement property (work/task.md landed
# verbatim inside the building root) and the building-map shape (incl.
# agent_bindings[].agent_binding_id) are EXECUTED by
# intake_evidence_projection_case (read_side_projection_boundary) over a
# check-time generated building.
text_contains:
  - path: brick_protocol/support/operator/run.py
    texts:
      - AgentFact
      - movement
      - AdapterFrontierEvidenceWritten
      - ChatSessionParkFrontierEvidenceWritten
      - _adapter_result_or_interrupt
      - _safe_exception_excerpt
      - credential redacted
      - write_adapter_error_frontier_evidence
      - write_chat_session_park_frontier_evidence
  # SELFLOCK-0706 family-② (D4, additive): the validate-before-persist self-lock
  # fix and the declared void correction path. These pins keep the D1 intake
  # gate and the D2 void verb/record kind from silently disappearing; the
  # behavioral + mutation coverage rides the already-registered
  # resume_replay_disposition_mirror kernel check (no new kernel_checks entry,
  # no new module_registry row -- t7b D5 fixture-home judgment).
  - path: brick_protocol/support/operator/onboard.py
    texts:
      - validate_disposition_intake(building_root, row
      - disposition_intake_refused_before_persist
      - def run_disposition_void_entry(
  - path: brick_protocol/support/operator/walker_resume.py
    texts:
      - def validate_disposition_intake(
      - DISPOSITION_VOID_RECORD_KIND
      - def _disposition_void_observations(
      - def disposition_rows_for_current_hold(
      # RESUME-ADMISSION-UNIFY 0707: single-source pins for the shared resume
      # admission sequence both firing points delegate to (behavioral +
      # AST-delegation coverage rides check_resume_admission_single_source.py;
      # no new kernel_checks entry).
      - def resume_admission_decision(
      - class ResumeAdmissionDecision
      - raise ValueError(_NO_RECORDED_RETURNS_REFUSAL)
      - raise ValueError(_RAISE_TARGET_NOT_NODE_REFUSAL)
      - enforce_raise_budget_increment
      - adapter_error_stop_short_circuit
      # RESUME-ADMISSION-BYPASS-PINS 0707 (D3): the live resume firing point keeps
      # a DECLARED RESIDUAL not-held/applied-resume guard before
      # _read_disposition_row that must raise the SHARED module constants (so its
      # literal cannot drift from the delegated sequence). The AST residual-guard
      # pin rides check_resume_admission_single_source.py; these text needles are
      # the complementary presence anchors (no new kernel_checks entry).
      - raise ValueError(_NOT_HELD_REFUSAL)
      - raise ValueError(_APPLIED_RESUME_REFUSAL)
  # PROCGROUP-HARDENING (B3): the adapter's single provider chokepoint
  # (_run_command) spawns codex/claude in its OWN process group
  # (start_new_session=True) and on timeout SIGKILLs the whole group
  # (os.killpg(os.getpgid(...))) so codex grandchildren never orphan; a
  # best-effort append-only spawn journal (env-overridable path) records
  # spawn/reap for forensics. These pins keep the process-group reap and the
  # journal seam from silently regressing.
  # MODULE-SEP god-module split: the provider subprocess chokepoint relocated
  # from agent_adapter.py into the adapter_subprocess.py sibling (re-exported by
  # the agent_adapter facade); the pins follow the moved symbols to their new home.
  - path: brick_protocol/support/connection/adapter_subprocess.py
    texts:
      - start_new_session=True
      - os.killpg
      - os.getpgid
      - BRICK_ADAPTER_SPAWN_JOURNAL_PATH
  # The public adapter-error frontier writer name stays exposed on the thin
  # facade (re-exported for external importers).
  - path: brick_protocol/support/operator/evidence_assembly.py
    texts:
      - write_adapter_error_frontier_evidence
      - write_chat_session_park_frontier_evidence
  - path: brick_protocol/support/operator/primitives.py
    texts:
      - _reject_session_like_text
      - _iter_string_positions
      - _SESSION_LIKE_UUID_TEXT_RE
      - _SESSION_LIKE_ULID_TEXT_RE
  # ELEGANT-REFACTOR P3b: the adapter-error frontier writer + its trace-packet and
  # lifecycle builders moved into the adapter-error frontier emitter; the
  # building-map frontier packet moved into the building-map emitter; the plan
  # snapshot (P12 BUILDING-PLAN-DURABILITY evidence copy) moved into the
  # declaration-packets emitter and is called from the lifecycle emitter. The
  # location pins follow the behavior-identical rehome (checker-pin-follows-rehome
  # standard); the recording_checker_derived_contract + building_lifecycle_path_shape
  # checks keep the produced shape pinned.
  - path: brick_protocol/support/recording/adapter_error_frontier.py
    texts:
      - write_adapter_error_frontier_evidence
      - write_chat_session_park_frontier_evidence
      - AdapterErrorFrontierTracePacket
      - ChatSessionParkFrontierTracePacket
      - _adapter_error_frontier_lifecycle_packet
      - _chat_session_park_frontier_lifecycle_packet
      - _adapter_error_frontier_building_map_packet
      - _agent_adapter_request_work_envelope
      - '"plan_snapshot": _plan_snapshot(plan_ref, plan)'
  - path: brick_protocol/support/recording/building_map_emit.py
    texts:
      - _adapter_error_frontier_building_map_packet
      - _chat_session_park_frontier_building_map_packet
  - path: brick_protocol/support/recording/declaration_packets.py
    texts:
      - 'def _plan_snapshot('
      - '"plan_hash": plan_hash'
      - '"proof_limits": ["evidence copy only", "not source truth"]'
  - path: brick_protocol/support/recording/step_outputs.py
    texts:
      - write_adapter_error_outputs
      - write_chat_session_park_outputs
      - agent_fact_created
      - chat_session_park_record
  - path: brick_protocol/support/recording/raw_claim_trace.py
    texts:
      - write_adapter_error_frontier_raw_and_claim_trace
      - write_chat_session_park_frontier_raw_and_claim_trace
      - receipt_trace.json
      - frontier_trace.json
  # ELEGANT-REFACTOR P3d: building_operation god-module decomposed; the pins below
  # follow each concern to its new module behind the facade (pin-follows-rehome).
  # Evidence presence (frontier required-set + marker) -> evidence_status.
  - path: brick_protocol/support/operator/evidence_status.py
    texts:
      - FRONTIER_EVIDENCE_FILES
      - PARKED_EVIDENCE_FILES
      - _frontier_marker_present
      - _parked_marker_present
  # Frontier observation (adapter-error count) -> frontier_observation.
  - path: brick_protocol/support/operator/frontier_observation.py
    texts:
      - adapter_error_records
      - chat_session_park_records
      - chat_session_parked
  # AXIS-SEPARATION: native-dispatch is Agent-axis vocabulary; support imports
  # the word and keeps the local alias so use-sites stay behavior-identical. The
  # native-dispatch seam -> native_dispatch.
  - path: brick_protocol/support/operator/native_dispatch.py
    texts:
      - 'from brick_protocol.agent.performance import NATIVE_DISPATCH_PERFORMANCE_MODE'
      - 'NATIVE_DISPATCH_EXECUTION_PATH = NATIVE_DISPATCH_PERFORMANCE_MODE'
  - path: brick_protocol/agent/performance.py
    texts:
      # AXIS-SEPARATION: the native-dispatch performance-mode WORD is owned here.
      - 'NATIVE_DISPATCH_PERFORMANCE_MODE = "native-dispatch"'
      - NATIVE_DISPATCH_PERFORMANCE_MODE
  - path: brick_protocol/support/checkers/check_building_lifecycle_path_shape.py
    texts:
      - FRONTIER_REQUIRED_RECORDS
      - PARKED_REQUIRED_RECORDS
      - adapter-error.json
      - chat-session-park.jsonl
      - work-envelope.json
      - parked.json
      - receipt_trace.json
      - frontier_trace.json
      - complete_required_records_present
      - frontier_required_records_present
      - parked_required_records_present
      - brick_comparison_field_ref_tokens
  - path: brick_protocol/support/checkers/lib/kernel_checks.py
    texts:
      - run_chat_session_park_seam
      - _chat_session_mutate_envelope_uuid
      - _chat_session_mutate_park_as_adapter_error
      - _chat_session_delete_work_envelope
      - _chat_session_assert_undeclared_adapter_rejects
      - _chat_session_assert_envelope_session_key_rejects
      - _chat_session_assert_key_scan_fire
      - _chat_session_value_only_session_rejector
      - _chat_session_probe_uuid_text
      - _chat_session_probe_ulid_text
text_absent:
  - path: brick_protocol/support/checkers/check_profile.py
    texts:
      - subprocess.run
      - os.system
      - eval(
      - exec(
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - provider answer quality
  - production runtime readiness
