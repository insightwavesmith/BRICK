schema: checker-profile/v1
profile_id: building-call-lowering
description: GOAL ⑤g confirmed-only Building Call lowering to existing materializer intent shape.
kernel_checks:
  - building_call_lowering_contract
  - structure_plan_fan_barrier
  - package_path_admission
  - axis_crossing_elegance
path_exists:
  - brick_protocol/support/operator/building_call.py
  - brick_protocol/support/checkers/fixtures/building_call_lowering/positive_confirmed_request.json
  - brick_protocol/support/checkers/fixtures/building_call_lowering/negative_draft_request.json
  - brick_protocol/support/checkers/fixtures/building_call_lowering/negative_held_for_coo_review.json
  - brick_protocol/support/checkers/lib/structure_plan_fan_barrier.py
  - brick_protocol/support/checkers/profiles/building_call_lowering.yaml
  - brick_protocol/support/checkers/profiles/structure_plan_fan_barrier.yaml
  - brick_protocol/support/checkers/module_registry.yaml
text_contains:
  - path: brick_protocol/support/operator/building_call.py
    texts:
      - BUILDING_CALL_LOWERING_SCHEMA_VERSION = "building-call-lowering-v1"
      - CONFIRMED_BUILDING_CALL_REQUEST_KIND = "confirmed_building_call_request_v1_1"
      - BUILDING_CASE_TO_CHAIN_PRESET_REF
      - ROSTER_VARIANT_STEP_SELECTIONS
      - lower_building_call_request_v1_1
      - building_call_lowering_v1
      - validate_building_call_lowering_request
      - selected_casting_provenance
      - no Building launch
      - no run_building_plan call
      - not source truth
      - not success judgment
      - not quality judgment
      - not Movement authority
  - path: brick_protocol/support/checkers/fixtures/building_call_lowering/positive_confirmed_request.json
    texts:
      - '"kind": "confirmed_building_call_request_v1_1"'
      - '"confirmation_state": "confirmed"'
      - '"building_case": "standard_delivery"'
      - '"roster_variant": "deep_work"'
      - '"casting_tier_ref": "casting-tier:light"'
  - path: brick_protocol/support/checkers/fixtures/building_call_lowering/negative_draft_request.json
    texts:
      - '"kind": "draft_building_call_request_v1_1"'
      - '"confirmation_state": "draft"'
      - only confirmed_building_call_request_v1_1 lowers
  - path: brick_protocol/support/checkers/fixtures/building_call_lowering/negative_held_for_coo_review.json
    texts:
      - '"gate_state": "held_for_coo_review"'
      - held_for_coo_review is not confirmed lowering input
  - path: brick_protocol/support/checkers/check_profile.py
    texts:
      - building_call_lowering_contract
      - structure_plan_fan_barrier
  - path: brick_protocol/support/checkers/lib/structure_plan_fan_barrier.py
    texts:
      - fan_barrier_violations
      - run_structure_plan_fan_barrier
      - graph fan-barrier RED did not fire
  - path: brick_protocol/support/checkers/module_registry.yaml
    texts:
      - brick_protocol/support/operator/building_call.py
      - brick_protocol/support/checkers/lib/structure_plan_fan_barrier.py
      - GOAL ⑤g confirmed-only lowering and GOAL ⑤h direct_preset_admission + fast_confirm evidence
text_absent:
  - path: brick_protocol/support/operator/building_call.py
    texts:
      - route_materialization.py
      - walker_kernel.py
      - walker_resume.py
      - def run_building_plan
      - run_building_plan(
      - run_building_intake(
      - materialize_building_intent(
      - compose_building(
      - materialize_transition_concern_disposition
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic fitness of future confirmed Building Call requests
  - future materialize_building_intent behavior
  - future Building execution behavior
