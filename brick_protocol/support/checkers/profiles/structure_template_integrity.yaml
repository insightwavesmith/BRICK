# REHOMED (guard-before-retire): the child_building_candidate_case behavioral
# oracle (exercises brick_protocol/support/operator/child_building_generation.py
# prepare_child_building_candidate_case: owner_axis==Brick, parent_goal_ref
# carry, selected_delta_ref subset of remaining_delta) lost its home when
# auto_child_building_generation.yaml was retired (slice-3). Rehomed here verbatim
# (fc28657:brick_protocol/support/checkers/profiles/auto_child_building_generation.yaml).
child_building_candidate_case:
  - label: child-generation-case:bar-v2-next-cascade-sweep
    document:
      child_generation_case_ref: child-generation-case:bar-v2-next-cascade-sweep
      owner_axis: Brick
      resource_kind: child_building_candidate_generation_case
      parent_goal_ref: goal:bar-v2-active-sequence
      remaining_delta:
        - AUTO-CHILD-BUILDING-GENERATION-0
        - CASCADE-SWEEP-0
        - BAR-V2-END-TO-END-DOGFOOD-0
      selected_delta_ref: CASCADE-SWEEP-0
      # W2 DOC-DECOUPLE (0611): inert fixture refs (never read or
      # existence-checked by child_building_generation.py) repointed off the
      # museum docs to the live constitution.
      selection_basis_refs:
        - AGENTS.md
      candidate_plan:
        plan_ref: building-plan:cascade-sweep-0-candidate
        owner_axis: Brick
        building_id: cascade-sweep-0-candidate-0526
        plan_shape: linear
        selected_adapter_ref: adapter:local
        parent_goal_ref: goal:bar-v2-active-sequence
        proof_limits:
          - candidate support evidence only
          - not active execution proof
          - not source truth
          - not success judgment
          - not quality judgment
          - not Movement authority
        not_proven:
          - actual cascade sweep implementation
          - BAR-v2 end-to-end dogfood
          - semantic completeness of stale reference detection
        remaining_delta:
          - CASCADE-SWEEP-0
          - BAR-V2-END-TO-END-DOGFOOD-0
        next_target_candidates:
          - CASCADE-SWEEP-0
        steps:
          - step_ref: cascade-sweep-0-candidate-01-inventory
            rows:
              - axis: Brick
                row_ref: brick-row:cascade-sweep-0-candidate-inventory
                brick_work_ref: work:cascade-sweep-0-candidate-inventory
                brick_instance_ref: brick-cascade-sweep-0-candidate-inventory
                work_statement: Inventory BAR-v2 stale references, superseded wording, and profile drift.
                comparison_rule: Observe grep/profile findings as support evidence only.
                required_return_shape: stale_reference_refs, drift_refs, proof_limits, not_proven
                source_facts:
                  - AGENTS.md
              - axis: Agent
                row_ref: agent-row:cascade-sweep-0-candidate-inventory
                agent_object_ref: agent-object:coo
              - axis: Link
                row_ref: link-row:cascade-sweep-0-candidate-inventory-to-repair
                movement: forward
                target_ref: brick-cascade-sweep-0-candidate-repair
                next_brick_instance_ref: brick-cascade-sweep-0-candidate-repair
                declared_gate_refs:
                  - link-gate:default-transition
          - step_ref: cascade-sweep-0-candidate-02-repair
            rows:
              - axis: Brick
                row_ref: brick-row:cascade-sweep-0-candidate-repair
                brick_work_ref: work:cascade-sweep-0-candidate-repair
                brick_instance_ref: brick-cascade-sweep-0-candidate-repair
                work_statement: Prepare declared repairs for observed stale BAR-v2 wording and profile drift.
                comparison_rule: Repair output remains a declared candidate until a later Building executes it.
                required_return_shape: repair_manifest_refs, proof_limits, not_proven
                source_facts:
                  - brick-cascade-sweep-0-candidate-inventory
              - axis: Agent
                row_ref: agent-row:cascade-sweep-0-candidate-repair
                agent_object_ref: agent-object:dev
              - axis: Link
                row_ref: link-row:cascade-sweep-0-candidate-repair-to-closure
                movement: forward
                target_ref: brick-cascade-sweep-0-candidate-closure
                next_brick_instance_ref: brick-cascade-sweep-0-candidate-closure
                declared_gate_refs:
                  - link-gate:default-transition
          - step_ref: cascade-sweep-0-candidate-03-closure
            rows:
              - axis: Brick
                row_ref: brick-row:cascade-sweep-0-candidate-closure
                brick_work_ref: work:cascade-sweep-0-candidate-closure
                brick_instance_ref: brick-cascade-sweep-0-candidate-closure
                work_statement: Close the cascade sweep candidate with parent delta and next dogfood target.
