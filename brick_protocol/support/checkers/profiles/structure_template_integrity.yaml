fail_fixture_rejects:
  - kind: building_plan_boundary
    label: bad-building-plan-conditional-route
    document:
      plan_ref: building-plan:bad-conditional-route
      owner_axis: Brick
      building_id: bad-conditional-route
      plan_shape: linear
      selected_adapter_ref: adapter:local
      parent_goal_ref: goal:bar-v2-active-sequence
      steps:
        - step_ref: bad-conditional-route-01-work
          rows:
            - axis: Brick
              row_ref: brick-row:bad-conditional-route-work
              brick_work_ref: work:bad-conditional-route-work
              brick_instance_ref: brick-bad-conditional-route-work
              work_statement: Bad fixture with hidden conditional Movement choice.
              comparison_rule: Must be rejected by building_plan_boundary.
              required_return_shape: rejected_fixture
            - axis: Agent
              row_ref: agent-row:bad-conditional-route-work
              agent_object_ref: agent-object:dev
            - axis: Link
              row_ref: link-row:bad-conditional-route-work
              movement: forward
              target_ref: brick-bad-conditional-route-closure
              if: qa_missing
              route_policy_match: automatic
  - kind: building_plan_boundary
    label: bad-building-plan-inline-agent-config
    document:
      plan_ref: building-plan:bad-inline-agent-config
      owner_axis: Brick
      building_id: bad-inline-agent-config
      plan_shape: linear
      selected_adapter_ref: adapter:local
      parent_goal_ref: goal:bar-v2-active-sequence
      steps:
        - step_ref: bad-inline-agent-config-01-work
          rows:
            - axis: Brick
              row_ref: brick-row:bad-inline-agent-config-work
              brick_work_ref: work:bad-inline-agent-config-work
              brick_instance_ref: brick-bad-inline-agent-config-work
              work_statement: Bad fixture with inline Agent resource config.
              comparison_rule: Must be rejected by building_plan_boundary.
              required_return_shape: rejected_fixture
            - axis: Agent
              row_ref: agent-row:bad-inline-agent-config-work
              agent_object_ref: agent-object:dev
              prompt_refs:
                - prompt:inline-forbidden
              adapter_refs:
                - adapter:codex-write-local
            - axis: Link
              row_ref: link-row:bad-inline-agent-config-work
              movement: forward
              target_ref: brick-bad-inline-agent-config-closure
  - kind: route_policy_boundary
    label: bad-route-policy-agent-endpoint
    document:
      route_policy_ref: route-policy:bad-agent-endpoint
      owner_axis: Link
      resource_kind: route_policy_contract
      fact_class_admission: not_admitted
      movement_literal: reroute
      agent_endpoint: agent-object:dev
