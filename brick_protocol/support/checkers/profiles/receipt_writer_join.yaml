schema: checker-profile/v1
profile_id: receipt-writer-join
description: receipt-writer-join DL-4 pin (0707). The NORMAL-completion forward writer must record raw/agent-received.jsonl in the SAME transaction as the returned rows so a completed walk carries the receipt ledger the frontier observer requires (without it a normal completion fails evidence_incomplete / T10). The executable adapter:local complete-walk probe + three mutation-RED probes (writer block + empty packet/no truthiness guard + scrub mask) live in the standalone brick_protocol/support/checkers/check_receipt_writer_join.py; this profile pins the surfaces so --all reports drift. Support evidence only.
path_exists:
  - brick_protocol/support/checkers/check_receipt_writer_join.py
  - brick_protocol/support/recording/raw_claim_trace.py
  - brick_protocol/support/recording/claims_agent.py
  - brick_protocol/support/recording/claims_assembly.py
  - brick_protocol/support/recording/contracts.py
  - brick_protocol/support/recording/lifecycle_emit.py
text_contains:
  - path: brick_protocol/support/recording/contracts.py
    texts:
      - agent_received_raw_records
  - path: brick_protocol/support/recording/claims_agent.py
    texts:
      - _agent_received_raw_records
      - received work observation only
  - path: brick_protocol/support/recording/claims_assembly.py
    texts:
      - _agent_received_raw_records
  - path: brick_protocol/support/recording/raw_claim_trace.py
    texts:
      - packet.agent_received_raw_records
      - raw/agent-received.jsonl
      - bp.raw.agent_received
  - path: brick_protocol/support/recording/lifecycle_emit.py
    texts:
      - received_raw_refs
      - raw/agent-received.jsonl
  - path: brick_protocol/support/checkers/check_receipt_writer_join.py
    texts:
      - normal-completion
      - received row count
      - zero-step / empty receipt packet
      - truthiness guard
      - raw-manifest.json lacks the
      - evidence-manifest raw_stream_refs lacks
      - mutation-RED
proof_limits:
