text_absent:
  - path: pyproject.toml
    texts:
      - '[tool.pytest.ini_options]'
      - 'testpaths = ["brick_protocol/support/checkers"]'
  - path: brick_protocol/support/operator/cli.py
    texts:
      - os.system
      - eval(
      - exec(
      - choose_movement
      - success_judgment
      - quality_judgment
      - adapter:gemini-api
      - '"--large"'
      - '"--dev-lanes"'
      - 'P3_EASY_LARGE'
      - '_p3_easy_large'
      - 'lane_return'
      - 'large-graph-declared'
      - 'p3_easy_large_graph'
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - real provider behavior
  - customer PATH shell behavior beyond the observed entrypoint launch
  - future Building correctness
