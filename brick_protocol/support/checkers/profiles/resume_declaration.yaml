schema: checker-profile/v1
profile_id: resume-declaration
description: Declarative resume JSON support surface loader, preflight, CLI lowering, and mutation-RED probes.
kernel_checks:
  - resume_declaration
path_exists:
  - brick_protocol/support/operator/resume_declaration.py
  - brick_protocol/support/operator/walker_resume.py
  - brick_protocol/support/operator/cli.py
  - brick_protocol/support/checkers/check_resume_declaration.py
  - brick_protocol/support/checkers/profiles/resume_declaration.yaml
text_contains:
  - path: brick_protocol/support/operator/resume_declaration.py
    texts:
      - RESUME_DECL_ACTIONS = ("raise", "forward", "stop", "reroute")
      - '"choice_kind": "engine_worktree_lifecycle"'
      - def load_resume_declaration
      - def validate_resume_declaration
      - def preflight_resume_declaration
      - def _dispo_adapter_cwd_choice
      - def resolve_dispo_adapter_cwd
      - def run_resume_declaration
      - _MAX_CHAIN_ROUNDS = 24
      - COO_GATE_HARVEST_SHA=<anchor>
      - resume_declaration_no_progress
      - resume_declaration_round_cap
      - runtime_error_kind
      - run_approve_entry
      - not Movement authority
  - path: brick_protocol/support/operator/walker_resume.py
    texts:
      - def _adapter_error_forward_retry
      - return ("forward", "stop")
      - adapter_error_forward_retry = _adapter_error_forward_retry(action, hold_record)
      - if not recorded_returns and not adapter_error_forward_retry
      - Adapter-error frontier evidence proves that provider invocation stopped
  - path: brick_protocol/support/operator/cli.py
    texts:
      - def _cmd_resume
      - resume_declaration.load_resume_declaration
      - resume_declaration.run_resume_declaration
      - "--decl"
      - "--dry-run"
  - path: brick_protocol/support/checkers/check_profile.py
    texts:
      - '"resume_declaration"'
      - support.checkers.check_resume_declaration
proof_limits:
  - checker profile support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic correctness of future caller declarations
  - provider reliability
  - future Building correctness
