schema: checker-profile/v1
profile_id: building-skill-preset-agent-resource-boundary
description: Staging copy slice for BUILDING-SKILL-PRESET-AGENT-TOOL-HARDENING-0 Agent resource, hook, tool-policy, and adapter boundary assertions.
kernel_checks:
  - package_path_admission
  - axis_contract_projection
  - agent_adapter_return_shape
path_exists:
  - brick_protocol/agent/skills/building-coordination/SKILL.md
  - brick_protocol/agent/skills/task_intake/SKILL.md
  - brick_protocol/agent/skills/building-sizing-method/SKILL.md
  - brick_protocol/agent/skills/brick-task-author/SKILL.md
  - brick_protocol/agent/skills/make-a-brick/SKILL.md
  - brick_protocol/agent/skills/make-an-agent/SKILL.md
  - brick_protocol/agent/skills/make-a-gate/SKILL.md
  - brick_protocol/agent/hooks/registry.yaml
  - brick_protocol/agent/hooks/bindings.yaml
  - brick_protocol/agent/tool_policies/leader-coordination.yaml
  - brick_protocol/agent/tool_policies/probe-write-scoped.yaml
  - brick_protocol/agent/tool_policies/read-write-scoped.yaml
  - brick_protocol/agent/tool_policies/reviewer-readonly.yaml
  - brick_protocol/support/connection/agent_resources.py
  - brick_protocol/support/connection/agent_adapter.py
  - brick_protocol/support/operator/run.py
  - brick_protocol/support/operator/write_observation.py
path_absent:
  - brick_protocol/agent/tool_policies/leader-readonly.yaml
  - brick_protocol/agent/tool_policies/review-readonly.yaml
  - brick_protocol/agent/tool_policies/support-readonly.yaml
text_contains:
  - path: brick_protocol/support/connection/agent_resources.py
    texts:
      - native hook execution remains closed
      - leader lane must carry hook:leader-write-need-gate
      - reviewer lane must carry hook:reviewer-no-mutation
      - retired tool policy ref
      - retired hook ref
      - leader lane must carry tool-policy:leader-coordination
      - A reviewer MAY carry tool-policy:probe-write-scoped
      - work-area write CAPABILITY
      - semantic_capability_classes are Agent policy class evidence
      - def resolve_agent_semantic_capability
      - max_semantic_capability_classes
      - hook:reviewer-no-mutation blocks source_write for reviewer lane
      - render_agent_team_context
      - provider-specific Agent identity is not admitted
      - write-capable adapter_refs remain technical capability refs, not authority
      - write authority requires Brick write_scope plus Agent write policy plus adapter capability plus write observation
  - path: brick_protocol/support/connection/mcp_projection.py
    texts:
      - brick_protocol_render_agent_team_context
      - brick-protocol://agent/team/context
  - path: brick_protocol/support/connection/agent_adapter.py
    texts:
      - _RETURN_WAIVER_FIELDS_BY_REQUIRED
      - return_field_waivers
      - no_changes_reason
      - def agent_request_read_tier
  - path: brick_protocol/support/connection/adapter_constants.py
    texts:
      - READ_ONLY_TOOL_POLICY_REFS
  - path: brick_protocol/support/connection/adapter_grant_policy.py
    texts:
      - Agent hook:reviewer-no-mutation blocks source_write for this performer.
      - probe_write / verification_write
      - full filesystem-enforced source/probe split is not proven here
      - read-only repository inspection tools only
      - Gemini local native grant may use only read_file, glob, grep_search, search_file_content, list_directory, read_many_files, and when web-capable is present google_web_search/web_fetch; write and shell tools remain blocked.
  - path: brick_protocol/agent/prompts/qa.md
    texts:
      - probe_write / verification_write
      - source_write
      - create, edit, delete, or rewrite real repo source files as
      - belongs to a separately declared
      - `work` / repair Brick
      - hook:reviewer-no-mutation
  - path: brick_protocol/agent/tool_policies/read-write-scoped.yaml
    texts:
      - semantic_capability_classes
      - probe_write
      - verification_write
      - source_write
      - artifact_write
  - path: brick_protocol/agent/tool_policies/probe-write-scoped.yaml
    texts:
      - semantic_capability_classes
      - probe_write
      - verification_write
      - source_write
      - artifact_write
  - path: brick_protocol/agent/prompts/inspector.md
    texts:
      - observe boundaries and evidence
      - without source_write
      - probe_write / verification_write
      - create, edit, delete, or rewrite real repo source files as source
      - belongs to a separately declared
      - repair Brick
      - hook:reviewer-no-mutation
json_required_paths:
  - path: brick_protocol/agent/objects/cto-lead.yaml
    required:
      - object_ref
      - lane
      - prompt_refs[]
      - skill_refs[]
      - hook_refs[]
      - tool_policy_refs[]
      - adapter_refs[]
  - path: brick_protocol/agent/hooks/registry.yaml
    required:
      - hooks.hook:leader-write-need-gate.owner_axis
      - hooks.hook:unsafe-mutation-guard.execution_opened
agent_resource_boundary:
  - role: coo
    lane: leader
    preferred_adapter_ref: adapter:codex-local
    preferred_model_ref: model:codex:default
    required_hook_refs:
      - hook:leader-write-need-gate
      - hook:unsafe-mutation-guard
      - hook:resource-ref-redaction
    required_tool_policy_refs:
      - tool-policy:leader-coordination
    forbidden_tool_policy_refs:
      - tool-policy:leader-readonly
      - tool-policy:read-write-scoped
    forbidden_adapter_refs:
      - adapter:codex-write-local
      - adapter:claude-write-local
    hooks_execution_opened: false
  - role: dev
    lane: worker
    preferred_adapter_ref: adapter:codex-local
    preferred_model_ref: model:codex:gpt-5.6-sol
    preferred_reasoning_effort_ref: effort:xhigh
    required_hook_refs:
      - hook:unsafe-mutation-guard
      - hook:resource-ref-redaction
    required_tool_policy_refs:
      - tool-policy:read-write-scoped
    required_adapter_refs:
      - adapter:codex-local
    forbidden_adapter_refs:
      - adapter:codex-write-local
      - adapter:claude-write-local
    hooks_execution_opened: false
  - role: qa
    lane: reviewer
    preferred_adapter_ref: adapter:claude-local
    preferred_model_ref: model:claude:sonnet
    preferred_reasoning_effort_ref: effort:xhigh
    required_hook_refs:
      - hook:reviewer-no-mutation
      - hook:unsafe-mutation-guard
      - hook:resource-ref-redaction
    required_tool_policy_refs:
      - tool-policy:probe-write-scoped
    required_adapter_refs:
      - adapter:local
      - adapter:codex-local
      - adapter:claude-local
      - adapter:gemini-local
    forbidden_tool_policy_refs:
      - tool-policy:review-readonly
      - tool-policy:read-write-scoped
    forbidden_adapter_refs:
      - adapter:codex-write-local
      - adapter:claude-write-local
    hooks_execution_opened: false
  - role: inspector
    lane: reviewer
    preferred_adapter_ref: adapter:claude-local
    preferred_model_ref: model:claude:sonnet
    preferred_reasoning_effort_ref: effort:xhigh
    required_hook_refs:
      - hook:reviewer-no-mutation
      - hook:unsafe-mutation-guard
      - hook:resource-ref-redaction
    required_tool_policy_refs:
      - tool-policy:probe-write-scoped
    required_adapter_refs:
      - adapter:local
      - adapter:codex-local
      - adapter:claude-local
      - adapter:gemini-local
    forbidden_tool_policy_refs:
      - tool-policy:review-readonly
      - tool-policy:read-write-scoped
    forbidden_adapter_refs:
      - adapter:codex-write-local
      - adapter:claude-write-local
    hooks_execution_opened: false
agent_resource_retired_ref_rejects:
  - ref_field: tool_policy_refs
    retired_ref: tool-policy:leader-readonly
    expected_message: "retired tool policy ref tool-policy:leader-readonly: use tool-policy:leader-coordination"
  - ref_field: tool_policy_refs
    retired_ref: tool-policy:review-readonly
    expected_message: "retired tool policy ref tool-policy:review-readonly: use tool-policy:reviewer-readonly"
  - ref_field: hook_refs
    retired_ref: hook:leader-no-code
    expected_message: "retired hook ref hook:leader-no-code: use hook:leader-write-need-gate"
agent_preferred_adapter_rejects:
  - expected_message: preferred_adapter_ref must be one of adapter_refs
    agent_object:
      lane: reviewer
      hook_refs:
        - hook:instruction-chain-read
        - hook:reviewer-no-mutation
        - hook:unsafe-mutation-guard
        - hook:resource-ref-redaction
      tool_policy_refs:
        - tool-policy:reviewer-readonly
      adapter_refs:
        - adapter:local
      preferred_adapter_ref: adapter:codex-local
  - expected_message: preferred_model_ref requires preferred_adapter_ref
    agent_object:
      lane: reviewer
      hook_refs:
        - hook:instruction-chain-read
        - hook:reviewer-no-mutation
        - hook:unsafe-mutation-guard
        - hook:resource-ref-redaction
      tool_policy_refs:
        - tool-policy:reviewer-readonly
      adapter_refs:
        - adapter:claude-local
      preferred_model_ref: model:claude:inherit
materialize_building_intent_case:
  - label: agent-resource-digest-sentinel-materialized-fast-fix
    document:
      plan_ref: building-plan:agent-resource-digest-sentinel-materialized-fast-fix
      building_id: agent-resource-digest-sentinel-materialized-fast-fix
      declared_by: coo
      task_source_ref: brick_protocol/brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:fast-fix
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - brick_protocol/support/operator/**
        forbidden_paths:
          - .git/**
          - .claude/**
      not_proven:
        - checker fixture task source only
    expected:
      plan_shape: graph
      agent_object_hashes_unchanged: true
proof_limits:
  - support evidence only
  - staging copies only; original profile remains intact
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - native hook execution behavior
  - provider-native tool permission behavior
  - complete Agent resource profile diet
