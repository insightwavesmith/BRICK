schema: checker-profile/v1
profile_id: import_identity_modes
description: R1 identity guard source/install split and parents[N] registry profile.
kernel_checks:
  - import_identity_modes
  - wheel_smoke
path_exists:
  - brick_protocol/support/operator/import_identity.py
  - brick_protocol/support/operator/cli.py
  - brick_protocol/support/operator/onboard.py
  - brick_protocol/support/checkers/check_import_identity_modes.py
  - brick_protocol/support/checkers/profiles/import_identity_modes.yaml
text_contains:
  - path: brick_protocol/support/operator/import_identity.py
    texts:
      - 'def resolve_operator_identity'
      - 'project.name = "brick-protocol"'
      - 'metadata.version(PROJECT_DISTRIBUTION_NAME)'
      - 'installed mode deliberately does not require a repo-root marker'
  - path: brick_protocol/support/operator/cli.py
    texts:
      - 'resolve_operator_identity(__file__)'
      - 'install_source_import_paths(_OPERATOR_IMPORT_IDENTITY)'
      - 'from brick_protocol.support.checkers import check_profile'
  - path: brick_protocol/support/operator/onboard.py
    texts:
      - 'resolve_operator_identity(__file__)'
      - 'install_source_import_paths(_OPERATOR_IMPORT_IDENTITY)'
  - path: brick_protocol/support/operator/run.py
    texts:
      - 'resolve_operator_identity(__file__)'
      - 'install_source_import_paths(_OPERATOR_IMPORT_IDENTITY)'
  - path: brick_protocol/support/checkers/check_import_identity_modes.py
    texts:
      - 'PARENTS_BINDING_REGISTRY'
      - 'PARENTS_BINDING_SCAN_ROOTS'
      - 'IDENTITY_HELPER_CONSUMERS'
      - 'importlib.metadata'
      - 'repo identity marker mismatch'
      - 'guard-removal probe'
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - future wheel publication
  - future provider behavior
  - complete runtime behavior outside observed entrypoint imports
