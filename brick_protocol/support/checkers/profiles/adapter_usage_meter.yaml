schema: checker-profile/v1
profile_id: adapter-usage-meter
description: Pins the per-step adapter token-usage METER (TrackA-A1 INSTRUMENT FIRST). The codex turn.completed token usage is recorded as a Brick-axis SUPPORT FACT in raw/adapter-usage.jsonl with the allowlisted counter keys (absent=null, never fabricated), and NEVER leaks into AgentFact.returned or any Link field (gate-no-measure). Runs the meter writer in-process with usage fixtures and AST-scans the real adapter + step-output source. Applies NO cap (a cap is TrackA-A2). Fails closed.
kernel_checks:
  - adapter_usage_meter
path_exists:
  - brick_protocol/support/recording/adapter_usage_meter.py
  - brick_protocol/support/connection/agent_adapter.py
  - brick_protocol/support/connection/adapter_subprocess.py
  - brick_protocol/support/connection/adapter_local_cli.py
  - brick_protocol/support/recording/step_outputs.py
  - brick_protocol/support/checkers/check_adapter_usage_meter.py
  - brick_protocol/support/checkers/profiles/adapter_usage_meter.yaml
text_contains:
  # MODULE-SEP god-module split: the codex --json usage-extraction + CLI-runner
  # spawns relocated from agent_adapter.py into the adapter_subprocess.py sibling
  # (re-exported by the agent_adapter facade). All five pinned literals now live
  # there; the text pin follows the moved symbols to their new home.
  - path: brick_protocol/support/connection/adapter_subprocess.py
    texts:
      - codex_usage_from_json_stdout
      - "--json"
      - adapter_usage
      - stdin=subprocess.DEVNULL
      - --output-last-message
  - path: brick_protocol/support/recording/adapter_usage_meter.py
    texts:
      - WORKFLOW_IMPORT_USAGE_METRIC_KEYS
      - raw/adapter-usage.jsonl
      - usage_present
      - bp.raw.adapter_usage
      - adapter_usage_recorded_at
      - model_alias_resolution
  - path: brick_protocol/support/connection/adapter_local_cli.py
    texts:
      - _local_cli_nonzero_classification
      - adapter_error_classification
      - adapter_error_recorded_at
      - dispatched_model
  - path: brick_protocol/support/checkers/check_adapter_usage_meter.py
    texts:
      - _returned_usage_leak_keys
      - _assert_local_cli_nonzero_classification
      - _assert_usage_record_timestamp_and_alias_resolution
      - mutation RED observed
      - gate-no-measure
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
  - measurement only; carries no cap
not_proven:
  - cumulative session token budget
  - token amplification cause
  - semantic correctness of the parsed usage block
