schema: checker-profile/v1
profile_id: agent-output-text-preservation
description: Pins full local-CLI adapter output text preservation as support evidence only. The full text must ride an AgentAdapterResult side-channel, stay out of AgentFact.returned, persist only in raw/agent-output-text.jsonl through the raw scrub, and reconcile into raw-manifest. Includes four mutation-RED observations.
kernel_checks:
  - agent_output_text_preservation
path_exists:
  - brick_protocol/support/connection/agent_adapter.py
  - brick_protocol/support/connection/adapter_local_cli.py
  - brick_protocol/support/recording/claims_agent.py
  - brick_protocol/support/recording/raw_claim_trace.py
  - brick_protocol/support/checkers/lib/kernel_checks.py
text_contains:
  - path: brick_protocol/support/connection/agent_adapter.py
    texts:
      - adapter_output_text
      - support raw
      - never inside
  - path: brick_protocol/support/recording/raw_claim_trace.py
    texts:
      - agent-output-text.jsonl
      - jsonl full adapter output text side-channel rows
  - path: brick_protocol/support/checkers/lib/kernel_checks.py
    texts:
      - run_agent_output_text_preservation
      - mutation RED observed
      - AgentFact.returned
proof_limits:
  - support output-text evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - provider behavior beyond captured output text
  - semantic completeness of all future sensitive payload classes
  - quality judgment
