schema: checker-profile/v1
profile_id: tier-a-three-axis-conformance
description: HALF-2 Tier A (refactor/automation goal 0601 §3) deterministic 3-axis automation conformance over an engine-GENERATED check-time Building (CLEAN-YARD v3 ephemeral generation, Smith 0611 -- no standing dogfood root; the harness runs the real dynamic walker on adapter:local into a temp root, asserts Brick + Agent + Link mechanics + Evidence + declaration_provenance, and removes it), with anti-tautological FIRE probes. The 14 standing-root path_exists pins of the 0531 era are SUPERSEDED by the harness's own launch-chain + evidence-shape assertions (assert_brick DECLARATION_CHAIN_ARTIFACTS + assert_evidence EVIDENCE_SHAPE_FILES assert the same file set on the generated root).
kernel_checks:
  - tier_a_three_axis_conformance
path_exists:
  - brick_protocol/support/checkers/check_tier_a_three_axis_conformance.py
text_contains:
  - path: brick_protocol/support/checkers/check_tier_a_three_axis_conformance.py
    texts:
      - def assert_brick
      - def assert_agent
      - def assert_link
      - def assert_evidence
      - def assert_declaration_provenance
      - def fire_probe
      - reroute_and_provenance_dropped
      # CLEAN-YARD v3 ephemeral generation seam: the harness must GENERATE the
      # asserted root with the real engine at check time (temp, removed after),
      # snapshot the held stage (link_paused) before the caller/COO raise
      # disposition + resume, and keep the budget-bound FIRE probe.
      - def generate_tier_a_case_root
      - def tier_a_case_plan
      - run_building_plan
      - resume_building_plan
      - transition_lifecycle_disposition_action
      - held-snapshot
      - budget_hold_unevidenced
text_absent:
  - path: brick_protocol/support/checkers/check_tier_a_three_axis_conformance.py
    texts:
      - 'from brick_protocol.brick'
      - 'from brick_protocol.agent'
      - 'from brick_protocol.link'
      - choose_movement
      - success_judgment
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
  - not real-provider proof
not_proven:
  - semantic correctness of Agent transition_concern_evidence
  - real-provider behavior
  - repeated provider reliability
  - checker profile pass as source truth
