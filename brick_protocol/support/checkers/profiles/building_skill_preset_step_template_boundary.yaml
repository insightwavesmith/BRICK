schema: checker-profile/v1
profile_id: building-skill-preset-step-template-boundary
description: BUILDING-SKILL-PRESET-AGENT-TOOL-HARDENING-0 declared step-template rendering boundary profile.
kernel_checks:
  - package_path_admission
  - axis_contract_projection
path_exists:
  - brick_protocol/support/operator/building_operation.py
  - brick_protocol/support/checkers/lib/declared_step_template_check.py
text_contains:
  - path: brick_protocol/support/checkers/check_profile.py
    texts:
      - declared_step_template_plan_case
      - declared_step_template_plan_rejects
  - path: brick_protocol/support/checkers/lib/case_runners.py
    texts:
      - run_declared_step_template_plan_case
      - run_declared_step_template_plan_rejects
declared_step_template_plan_case:
  - label: default-parity-omit-adapter
    document:
      plan_ref: building-plan:default-parity-omit-adapter
      building_id: default-parity-omit-adapter
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      # selected_adapter_ref intentionally omitted — DEFAULT-PARITY: the linear
      # render path must default it to adapter:local (like compose_building), not
      # "" (which plan_validation rejects). This case renders only if the default
      # parity holds.
      steps:
        - step_ref: dp-plan
          brick_word: plan
          agent_word: pm
          link: design
          brick:
            row_ref: brick-row:dp-plan
            brick_work_ref: work:dp-plan
            brick_instance_ref: brick-plan
            work_statement: Plan the default-parity proof.
            comparison_rule: Observe step template expansion only.
            required_return_shape: observed_evidence, not_proven
    expected:
      movement: forward
      target_ref: brick-design
      declared_gate_refs:
        - link-gate:default-transition
  - label: declared-step-template-plan-case:plan-pm
    document:
      plan_ref: building-plan:building-skill-preset-agent-tool-hardening-plan-pm
      building_id: building-skill-preset-agent-tool-hardening-plan-pm
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
