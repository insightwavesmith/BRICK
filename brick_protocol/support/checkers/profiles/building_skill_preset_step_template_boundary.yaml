          brick_word: plan
          agent_word: pm
          link: design
          brick:
            row_ref: brick-row:hardening-plan
            brick_work_ref: work:hardening-plan
            brick_instance_ref: brick-plan
            work_statement: Plan the hardening sequence.
            comparison_rule: Observe step template expansion only.
            required_return_shape: observed_evidence, not_proven
