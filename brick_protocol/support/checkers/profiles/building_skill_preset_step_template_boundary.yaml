      target_ref: brick-closure
      declared_gate_refs:
        - link-gate:default-transition
  - label: declared-step-template-plan-case:linear-same-need-agent-override
    # finding-2 regression: the linear render path honors a step-level
    # agent_object_ref override when it satisfies the same brick NEED (mirrors the
    # graph path). code-attack-qa NEED = reviewer / non-writer; agent_object_hint_ref =
    # agent-object:qa. The same-NEED override agent-object:inspector (also reviewer
    # / non-writer) must CHANGE the stamped Agent row from qa to inspector.
    document:
      plan_ref: building-plan:building-skill-preset-agent-tool-hardening-linear-override
      building_id: building-skill-preset-agent-tool-hardening-linear-override
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: hardening-code-qa-override
          step_template_ref: building-step-template:code-attack-qa
          agent_object_ref: agent-object:inspector
          link: inspect
          brick:
            row_ref: brick-row:hardening-code-qa-override
            brick_work_ref: work:hardening-code-qa-override
            brick_instance_ref: brick-code-qa-override
            work_statement: Attack implementation code under a same-NEED agent override.
            comparison_rule: Return the QA Brick's own fields without Link-facing transition_concern_evidence.
            required_return_shape: observed_evidence, attacked_work, checked_sources, regression_risks, negative_probe_observations, failing_or_missing_probes, boundary_violations, evidence_used, not_proven
    expected:
      movement: forward
      target_ref: brick-inspect
      agent_object_ref: agent-object:inspector
      brick_capability_class: probe_write
      declared_gate_refs:
        - link-gate:default-transition
  - label: declared-step-template-plan-case:plan-preferred-adapter
    document:
      plan_ref: building-plan:building-skill-preset-agent-tool-hardening-plan-preferred-adapter
      building_id: building-skill-preset-agent-tool-hardening-plan-preferred-adapter
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      selected_model_ref: model:codex:default
      steps:
        - step_ref: hardening-plan-preferred-adapter
          step_template_ref: building-step-template:plan
          link: closure
          brick:
            row_ref: brick-row:hardening-plan-preferred-adapter
            brick_work_ref: work:hardening-plan-preferred-adapter
            brick_instance_ref: brick-plan-preferred-adapter
            work_statement: Render PM provider preference stamping.
            comparison_rule: Return PM planning evidence without provider judgment.
            required_return_shape: observed_evidence, not_proven
    expected:
      movement: forward
      target_ref: brick-closure
      agent_object_ref: agent-object:pm-lead
      selected_adapter_ref: adapter:claude-local
      selected_model_ref: model:claude:claude-fable-5
      selected_reasoning_effort_ref: effort:xhigh
      declared_gate_refs:
        - link-gate:default-transition
declared_step_template_plan_rejects:
  # KIND REVERT (0611, Smith ruling): cto-assignment -> development (the 0610
  # rename put a role in the kind name -- an axis smell). The short-lived
  # cto-assignment name lived on origin/main for about a day, so it must
  # REJECT loudly (plan_rendering names the canonical replacement); the
  # positive development case above is the anti-tautology twin (same shape,
  # canonical name, renders).
  - label: declared-step-template-plan-rejects:retired-cto-assignment-step-template
    # MESSAGE PIN: the rejection must be the LOUD retired message naming the
    # canonical replacement -- not the generic not-in-catalog error. Delete
    # the RETIRED_STEP_TEMPLATE_REFS entry and this case goes RED on message
    # mismatch (anti-tautology verified).
    expected_message: "is retired: use building-step-template:development"
    document:
      plan_ref: building-plan:retired-cto-assignment-step-template
      building_id: retired-cto-assignment-step-template
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: retired-cto-assignment
          step_template_ref: building-step-template:cto-assignment
          link: work
          brick:
            row_ref: brick-row:retired-cto-assignment
            brick_work_ref: work:retired-cto-assignment
            brick_instance_ref: brick-retired-cto-assignment
            work_statement: Retired cto-assignment step template name must reject.
            comparison_rule: Retired name never silently resolves.
            required_return_shape: rejected_fixture
  - label: declared-step-template-plan-rejects:linear-need-violating-agent-override
    # finding-2 regression (negative): a step-level agent_object_ref override that
    # VIOLATES the brick NEED must be rejected (the linear path is fail-closed).
    # code-attack-qa NEED = reviewer / non-writer; agent-object:dev is worker /
    # writer, so the override escapes the NEED and must raise.
    document:
      plan_ref: building-plan:building-skill-preset-agent-tool-hardening-linear-override-reject
      building_id: building-skill-preset-agent-tool-hardening-linear-override-reject
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: hardening-code-qa-bad-override
          step_template_ref: building-step-template:code-attack-qa
          agent_object_ref: agent-object:dev
          link: inspect
          brick:
            row_ref: brick-row:hardening-code-qa-bad-override
            brick_work_ref: work:hardening-code-qa-bad-override
            brick_instance_ref: brick-code-qa-bad-override
            work_statement: Attempt a NEED-violating agent override on a QA step.
            comparison_rule: Return the QA Brick's own fields without Link-facing transition_concern_evidence.
            required_return_shape: observed_evidence, attacked_work, checked_sources, regression_risks, negative_probe_observations, failing_or_missing_probes, boundary_violations, evidence_used, not_proven
  - label: bad-step-template-graph-preset-linear-engine-feature-hard
    document:
      plan_ref: building-plan:bad-step-template-graph-preset-linear-engine-feature-hard
      building_id: bad-step-template-graph-preset-linear-engine-feature-hard
      selected_shape_ref: building-shape:design-needed
      chain_preset_ref: building-chain-preset:brick-protocol-engine-feature-hard
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: bad-graph-linear-design
          step_template_ref: building-step-template:design
          link: work
          brick:
            row_ref: brick-row:bad-graph-linear-design
            brick_work_ref: work:bad-graph-linear-design
            brick_instance_ref: brick-design
            work_statement: Bad linear rendering of graph preset design.
            comparison_rule: Graph preset must not be smuggled through the linear renderer.
            required_return_shape: rejected_fixture
        - step_ref: bad-graph-linear-work
          step_template_ref: building-step-template:work
          link: code_attack_qa
          brick:
            row_ref: brick-row:bad-graph-linear-work
            brick_work_ref: work:bad-graph-linear-work
            brick_instance_ref: brick-work
            work_statement: Bad linear rendering of graph preset work.
            comparison_rule: Graph preset must declare fan-out/fan-in graph grammar.
            required_return_shape: rejected_fixture
        - step_ref: bad-graph-linear-code-qa
          step_template_ref: building-step-template:code-attack-qa
          link: closure
          brick:
            row_ref: brick-row:bad-graph-linear-code-qa
            brick_work_ref: work:bad-graph-linear-code-qa
            brick_instance_ref: brick-code-qa
            work_statement: Bad linear rendering of graph preset code QA.
            comparison_rule: Graph preset must declare fan-in edge groups.
            required_return_shape: rejected_fixture
        - step_ref: bad-graph-linear-axis-qa
          step_template_ref: building-step-template:axis-attack-qa
          link: closure
          brick:
            row_ref: brick-row:bad-graph-linear-axis-qa
            brick_work_ref: work:bad-graph-linear-axis-qa
            brick_instance_ref: brick-axis-qa
            work_statement: Bad linear rendering of graph preset axis QA.
            comparison_rule: Graph preset must declare fan-in edge groups.
            required_return_shape: rejected_fixture
        - step_ref: bad-graph-linear-evidence
          step_template_ref: building-step-template:evidence-integrity
          link: closure
          brick:
            row_ref: brick-row:bad-graph-linear-evidence
            brick_work_ref: work:bad-graph-linear-evidence
            brick_instance_ref: brick-evidence
            work_statement: Bad linear rendering of graph preset evidence lane.
            comparison_rule: Graph preset must declare fan-in edge groups.
            required_return_shape: rejected_fixture
        - step_ref: bad-graph-linear-closure
          step_template_ref: building-step-template:closure
          link: closure
          brick:
            row_ref: brick-row:bad-graph-linear-closure
            brick_work_ref: work:bad-graph-linear-closure
            brick_instance_ref: brick-closure
            work_statement: Bad linear closure for graph preset.
            comparison_rule: Closure-synthesis is not proof that graph grammar was declared.
            required_return_shape: rejected_fixture
  - label: bad-step-template-compact-multiple-targets
    document:
      plan_ref: building-plan:bad-step-template-compact-multiple-targets
      building_id: bad-step-template-compact-multiple-targets
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: bad-compact-targets
          brick_word: plan
          agent_word: pm
          link: design or work
          brick:
            row_ref: brick-row:bad-compact-targets
            brick_work_ref: work:bad-compact-targets
            brick_instance_ref: brick-plan
            work_statement: Bad compact link with multiple targets.
            comparison_rule: Must reject support target inference.
            required_return_shape: rejected_fixture
  - label: bad-step-template-unknown-gate-token
    document:
      plan_ref: building-plan:bad-step-template-unknown-gate-token
      building_id: bad-step-template-unknown-gate-token
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: bad-unknown-gate
          brick_word: plan
          agent_word: pm
          link: magic -> design
          brick:
            row_ref: brick-row:bad-unknown-gate
            brick_work_ref: work:bad-unknown-gate
            brick_instance_ref: brick-plan
            work_statement: Bad compact link with unadmitted gate token.
            comparison_rule: Must reject unknown gate syntax.
            required_return_shape: rejected_fixture
  - label: bad-step-template-missing-link-declaration
    document:
      plan_ref: building-plan:bad-step-template-missing-link-declaration
      building_id: bad-step-template-missing-link-declaration
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: bad-missing-link
          brick_word: plan
          agent_word: pm
          brick:
            row_ref: brick-row:bad-missing-link
            brick_work_ref: work:bad-missing-link
            brick_instance_ref: brick-plan
            work_statement: Bad step template intent without compact link or link_word.
            comparison_rule: Must not infer Link movement from Brick and Agent words alone.
            required_return_shape: rejected_fixture
  - label: bad-step-template-development-write-scope
    document:
      plan_ref: building-plan:bad-step-template-development-write-scope
      building_id: bad-step-template-development-write-scope
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: bad-development-write-scope
          brick_word: development
          agent_word: cto
          link: work
          brick:
            row_ref: brick-row:bad-development-write-scope
            brick_work_ref: work:bad-development-write-scope
            brick_instance_ref: brick-development
            work_statement: Bad CTO assignment step template with write scope.
            comparison_rule: Must reject CTO direct coding.
            required_return_shape: rejected_fixture
            write_scope:
              allowed_paths:
                - brick_protocol/support/operator/**
  # main (6/4 retirement): a development step template that selects the retired
  # adapter:codex-write-local must be rejected by render_declared_step_template_plan.
  - label: bad-step-template-development-write-adapter
    document:
      plan_ref: building-plan:bad-step-template-development-write-adapter
      building_id: bad-step-template-development-write-adapter
      selected_shape_ref: building-shape:reviewable-work
      declared_by: coo
      selected_adapter_ref: adapter:local
      steps:
        - step_ref: bad-development-write-adapter
          brick_word: development
          agent_word: cto
          link: work
          selected_adapter_ref: adapter:codex-write-local
          brick:
            row_ref: brick-row:bad-development-write-adapter
            brick_work_ref: work:bad-development-write-adapter
            brick_instance_ref: brick-development
            work_statement: Bad CTO assignment step template with compatibility write alias.
            comparison_rule: Must reject CTO direct compatibility write alias use.
            required_return_shape: rejected_fixture
  # branch (U5/D5): the bad-step-template-chain-preset-shape-mismatch rejection
  # case was removed. selected_shape_ref is now an OPTIONAL recorded tag, so a
  # chain preset whose selected_shape_ref differs from the caller declaration is no
  # longer rejected by render_declared_step_template_plan (the membership/match
  # constraint was dropped). The compose_building (graph) path now drops shape
  # membership too (parity): its c1-unknown-shape / c1-collect-all reject cases were
  # removed in the same change, so shape_ref is a pure optional tag on BOTH the
  # linear and graph paths and no path asserts shape-membership rejection any longer.
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic fitness of future chain preset selection
  - native hook execution behavior
  - provider-native tool permission behavior
