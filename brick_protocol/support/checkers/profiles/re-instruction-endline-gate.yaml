schema: checker-profile/v1
profile_id: re-instruction-endline-gate
description: Adoption-time consumption of reroute-defaults.yaml re_instruction endline rules for human/COO reroute text.
kernel_checks:
  - re_instruction_endline_gate
path_exists:
  - brick_protocol/brick/templates/reroute-defaults.yaml
  - brick_protocol/brick/templates/enforcement-ledger.yaml
  - brick_protocol/support/operator/re_instruction_rules.py
  - brick_protocol/support/operator/onboard.py
  - brick_protocol/support/operator/walker_resume.py
  - brick_protocol/support/checkers/lib/re_instruction_endline_gate_check.py
  - brick_protocol/support/checkers/profiles/re-instruction-endline-gate.yaml
text_contains:
  - path: brick_protocol/support/operator/re_instruction_rules.py
    texts:
      - re_instruction_endline_rules
      - re_instruction_rule_violations
      - invalid_re_instruction_endline_result
  - path: brick_protocol/support/operator/onboard.py
    texts:
      - _re_instruction_endline_rules
      - _re_instruction_rule_violations
      - _invalid_re_instruction_endline_result
  - path: brick_protocol/support/operator/walker_resume.py
    texts:
      - _validated_resume_re_instruction
      - re_instruction_endline_rule_violation
  - path: brick_protocol/support/checkers/check_profile.py
    texts:
      - re_instruction_endline_gate
      - run_re_instruction_endline_gate
  - path: brick_protocol/support/checkers/lib/re_instruction_endline_gate_check.py
    texts:
      - _validated_resume_re_instruction
      - invalid non-reroute re_instruction
      - missing-endline
      - non-executable-proof
      - read-only-all-proof
      - standalone-done-required
      - scope-repair-without-coo-gate
      - carried-real-sample
      - korean-postfix-prohibition
      - descriptive-mention
      - token-boundary
  - path: brick_protocol/brick/templates/enforcement-ledger.yaml
    texts:
      - brick_protocol/support/operator/onboard.py run_approve_entry adoption-time check
      - brick_protocol/support/checkers/lib/re_instruction_endline_gate_check.py kernel check re_instruction_endline_gate
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic fitness of future re_instruction wording
  - provider behavior
