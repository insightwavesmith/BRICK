schema: checker-profile/v1
profile_id: provider-registry-ladder
description: Fixture-only provider registry persistence, declared-performer fail-closed readiness, and casting-tier guard.
kernel_checks:
  - provider_registry_ladder
path_exists:
  - brick_protocol/support/operator/provider_registry.py
  - brick_protocol/support/operator/plan_rendering.py
  - brick_protocol/support/operator/onboard.py
  - brick_protocol/support/checkers/check_provider_registry_ladder.py
  - brick_protocol/support/checkers/profiles/provider_registry_ladder.yaml
text_contains:
  - path: brick_protocol/support/checkers/check_provider_registry_ladder.py
    texts:
      - 'tempfile.TemporaryDirectory(prefix="bp-provider-registry-")'
      - 'os.environ["BRICK_HOME"] = tmp'
      - 'absent providers.yaml preserves legacy lane preference'
      - 'ready non-declared provider cannot replace lane performer'
      - 'ready codex cannot replace declared inspector performer'
      - 'malformed non-declared registry row cannot select a performer'
      - 'automatic adapter substitution is forbidden'
      - 'must be byte-identical for all Agent Objects'
      - 'BRICK_PROVIDER_LADDER=0 forces legacy behavior'
      - 'declared casting tier resolves once through ready providers.yaml'
      - 'tier plus selected_* literal bypass'
      - 'tier without providers.yaml'
      - 'tier with disabled ladder'
      - 'tier with no ready adapter in declared ladder'
      - 'brick(tier=) did not carry casting_tier_ref'
      - 'preset raw tier/lens step resolves before graph copy seam'
      - 'step_selection_overrides tier/lens resolves before graph copy seam'
      - 'legacy selected_* literal preset step remains accepted'
      - 'fleet preset still carries concrete selected_* literal'
  - path: brick_protocol/support/operator/provider_registry.py
    texts:
      - 'PROVIDERS_FILENAME = "providers.yaml"'
      - 'PROVIDER_LADDER_ENV = "BRICK_PROVIDER_LADDER"'
      - 'registry_path.chmod(0o600)'
      - 'register_ready_provider'
      - 'last_preflight'
      - '_validate_model_ref_for_adapter'
      - 'CASTING_TIER_DECLARATIONS'
      - 'resolve_casting_tier'
      - 'casting-tier:standard'
      - 'model:claude:claude-opus-4-8'
      - 'model:sakana:fugu-ultra'
text_absent:
  - path: brick_protocol/support/checkers/check_provider_registry_ladder.py
    texts:
      - 'Path.home() / ".brick"'
      - 'provider_registry_path()'
proof_limits:
  - support evidence only
  - fixture-only provider registry checker
  - casting-tier resolution checker
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - real provider preflight execution or model availability outside the fixture registry
  - live customer providers.yaml readiness outside temp BRICK_HOME fixtures
  - persistence behavior in a live user BRICK_HOME or ~/.brick directory
  - provider credential validity, provider session state, or adapter runtime quality
  - source truth
  - success judgment
  - quality judgment
  - Movement authority
