# E2 / S10 — JUDGMENT-HOME REGISTRY (judgment-guard source).
#
# The design's erosion path ① is support JUDGING: making a requirement /
# completeness / validity VERDICT on an axis's fields when that verdict is the
# axis's to make. §4 relocated each judgment family (J1..J10) to its owning axis;
# this registry records WHERE each relocated verdict now lives and WHICH support
# modules may legitimately CONSUME it (gather the facts + call the axis verdict).
#
# check_support_no_axis_judgment.py AST-scans every module under brick_protocol/support/ and REDs
# if a module OUTSIDE a family's declared consumer set contains the relocated
# VERDICT SHAPE for that family: a CONDITIONAL assignment / keyword of a registered
# axis verdict FIELD to one of the family's registered verdict VALUE literals (an
# ``ast.IfExp`` ternary, or an assignment that sits inside an ``if`` / ``elif``
# branch). That conditional-literal-on-an-axis-field shape is exactly the verdict
# ladder / downgrade that §4 moved to the axis.
#
# WHAT IS *NOT* A JUDGMENT (never RED):
#   * an UNCONDITIONAL construction default — e.g. ``BrickComparisonFact.from_parts(
#     ..., observed_match_kind="unknown")`` in run.py is a neutral fact default a
#     support module stamps when it does NOT classify the return; it is not gated on
#     any axis condition and uses a NEUTRAL value, not a verdict value, so it is not
#     a verdict.
#   * pure TRANSPORT — re-emitting an already-decided ``frontier_kind`` value read
#     from an observation record (reporter / driver / building_map_emit pass the
#     decided value through). The guard fires only on a CONDITIONAL assignment to a
#     registered verdict VALUE literal, never on threading a variable.
#   * a single field-by-name READ (``record.get("frontier_kind")``) — an ordinary
#     field access, not a verdict.
#
# GUARD-FIRST (design §7 item 2, §8 S10): the families below are all already
# relocated on the CURRENT tree (J6->Link, J10->Brick, J3->Agent generic resolver,
# J5->Brick), so support contains NONE of these verdict shapes today -> the guard is
# GREEN now and turns RED only on a regression (re-inlining a relocated verdict into
# support). Families whose verdict legitimately STAYS a support invariant (J11
# forbidden-key walls, J12 path-escape) are NOT registered — they are checker /
# invariant concerns, not axis verdicts (design §4).
#
# Support evidence only: this checker decides no Movement and judges no source
# truth, success, or quality. It is an independent AST oracle over brick_protocol/support/.

schema: judgment-home/v1

judgment_families:
  # J6 — frontier SUFFICIENCY verdict. The "which frontier_kind has the recorded
  # evidence reached?" ladder relocated to the Link axis (brick_protocol/link/spec.py
  # frontier_sufficiency_verdict); brick_protocol/support/operator/frontier_observation.py gathers
  # the facts and reads the verdict. The verdict FIELD is ``frontier_kind``; the
  # verdict VALUE literals are the frontier_kind decision outcomes. A support module
  # outside frontier_observation that conditionally assigns frontier_kind to one of
  # these literals would be re-making the relocated Link sufficiency verdict.
  - family: J6_frontier_sufficiency
    verdict: "which frontier_kind the recorded evidence has reached (Link sufficiency)"
    axis: Link
    axis_module: brick_protocol/link/spec.py
    axis_symbol: frontier_sufficiency_verdict
    verdict_field: frontier_kind
    verdict_values:
      - complete
      - closure_pending
      - evidence_incomplete
      - chat_session_parked
      - agent_incomplete
      - link_paused
      - human_review_waiting
    allowed_consumers:
      # gathers the facts + reads the Link verdict; the kind vocabulary is its
      # support-owned single source (FRONTIER_KINDS), so it names the literals here
      # to build the FrontierSufficiencyVocab bundle it passes INTO the axis.
      - brick_protocol/support/operator/frontier_observation.py

  # J10 — artifact-grounding COMPLETENESS verdict. The "is the Brick return complete
  # given its grounding-bearing field?" downgrade relocated to the Brick axis
  # (brick_protocol/brick/spec.py apply_artifact_grounding_completeness); brick_protocol/support/operator/
  # plan_validation.py gathers the grounding facts and reads the verdict. The verdict
  # FIELD is ``observed_match_kind``; the verdict VALUE is the "missing" downgrade. A
  # support module that conditionally assigns observed_match_kind to "missing" would
  # be re-making the relocated Brick completeness verdict. (run.py's unconditional
  # ``observed_match_kind="unknown"`` neutral default is not flagged: it is
  # unconditional and "unknown" is not a registered verdict value.)
  - family: J10_artifact_grounding_completeness
    verdict: "downgrade a Brick comparison fact's observed_match_kind on missing grounding (Brick completeness)"
    axis: Brick
    axis_module: brick_protocol/brick/spec.py
    axis_symbol: apply_artifact_grounding_completeness
    verdict_field: observed_match_kind
    verdict_values:
      - missing
    allowed_consumers: []
