{
  "_header": [
    "VOCABULARY: these are Agent-axis ADVISORY INTENTS, never executed (every entry: execution_opened false).",
    "The EXECUTING hooks are per-machine config (.claude/hooks/, .codex/hooks/) wired by the onboard recording step."
  ],
  "hooks": {
    "hook:instruction-chain-read": {
      "owner_axis": "Agent",
      "kind": "advisory",
      "event_ref": "before-agent-work",
      "description": "Check AGENTS.md and the project PROGRESS projection before protocol surfaces change.",
      "execution_opened": false
    },
    "hook:leader-write-need-gate": {
      "owner_axis": "Agent",
      "kind": "guardrail-intent",
      "event_ref": "before-agent-mutation",
      "description": "Leader lane may implement directly when the Brick declares a write_scope NEED and the leader carries write capability; otherwise it defaults to coordination and worker assignment.",
      "execution_opened": false
    },
    "hook:reviewer-no-mutation": {
      "owner_axis": "Agent",
      "kind": "guardrail-intent",
      "event_ref": "before-review-work",
      "description": "Reviewer lane may read and perform declared disposable probe_write / verification_write, but must not perform source_write or claim source truth.",
      "execution_opened": false
    },
    "hook:unsafe-mutation-guard": {
      "owner_axis": "Agent",
      "kind": "guardrail-intent",
      "event_ref": "before-tool-use",
      "description": "Reject or flag destructive, approval-required, broad autofix, or out-of-scope mutation intent.",
      "execution_opened": false
    },
    "hook:resource-ref-redaction": {
      "owner_axis": "Agent",
      "kind": "advisory",
      "event_ref": "before-agent-return",
      "description": "Ensure Agent returns contain refs only for setup tokens and connector state.",
      "execution_opened": false
    },
    "hook:token-cost-discipline": {
      "owner_axis": "Agent",
      "kind": "guardrail-intent",
      "event_ref": "before-tool-use",
      "description": "Prefer bounded evidence/log inspection (field extraction, wc, tail, exact grep) and flag broad raw/evidence/check-log reads; delegate broad scans to Codex subagents when useful. Structured step-output return fields persist in full — output_excerpt alone is a 600-char preview (adapter_local_cli parses the full text into structured fields), so bounded inspection means reading the right structured field, never truncating a return for cost. Advisory only; execution_opened false.",
      "execution_opened": false
    }
  }
}
