template_ref: brick-template:design-return
owner_axis: Brick
template_kind: design_return_shape
maps_to: AgentFact.returned
step_template_refs:
  - building-step-template:design
required_return_shape:
  - observed_evidence
  - design_summary
  - relevant_current_structure
  - proposed_changes
  - unchanged_surfaces
  - axis_responsibility
  - invariants
  - edge_cases
  - checker_or_verifier_plan
  - candidate_file_changes
  - evidence_refs
  - not_proven
  - reading_scope_map
# The HANDOFF subset of required_return_shape -- the "쪽지" the DOWNSTREAM worker
# needs inline. Support FILTERS the carried upstream summary to these fields
# before it becomes the next node's source_facts. The COMMON ENVELOPE
# (observed_evidence, not_proven, evidence_used, proof_limits, received_work_ref,
# transition_concern_evidence) stays LOCAL and is never forwarded. Every field
# here is a member of required_return_shape above (a legitimate subset).
# downstream = work.
carries_forward_fields:
  - proposed_changes
  - reading_scope_map
  - invariants
  - axis_responsibility
  - candidate_file_changes
next_link_input_sections:
  - public facts available for Link
  - missing facts for Link Gate
  - handoff refs
  - not_proven
forbidden_return_keys:
  - success
  - failure
  - approved
  - quality
  - good_enough
  - movement_choice
  - route_target
proof_limits:
  - Brick-owned return-shape data resource only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - implementation readiness
  - semantic fitness of proposed design
  - support loader behavior
