template_ref: brick-template:plan-return
owner_axis: Brick
template_kind: plan_return_shape
maps_to: AgentFact.returned
step_template_refs:
  - building-step-template:plan
required_return_shape:
  - objective_summary
  - scope_boundaries
  - constraints
  - missing_scope
  - proposed_next_work_boundaries
  - observed_evidence
  - not_proven
  - transition_concern_evidence
# HANDOFF subset carried inline to design / first work; support FILTERS to these.
# Common envelope (observed_evidence, not_proven, transition_concern_evidence)
# stays LOCAL. Every field is a member of required_return_shape above.
# transition_concern_evidence.reason_refs address rule: only the current
# Building work/step-outputs document path form may contain a slash. Such refs
# must be existing step-output documents under this Building's work/step-outputs/
# subtree, with no #fragment; step-output fragments, bare file:line citations,
# non-step-output slash paths, any other slash-containing document paths, and
# descriptive refs belong under observed_evidence / evidence_used /
# checked_sources, or as slashless opaque tokens such as observation:<id>.
# transition_concern_evidence.related_boundary_refs address rule: only reroute
# target Brick refs in bare brick-... form, or building-boundary: sentinel refs,
# are admitted. File paths and prose citations are not admitted.
# New authored returns must not use brick:, brick-instance:, or brick-boundary:;
# any old-shape replay tolerance is support compatibility evidence only.
carries_forward_fields:
  - scope_boundaries
  - constraints
  - proposed_next_work_boundaries
next_link_input_sections:
  - public facts available for Link
  - missing facts for Link Gate
  - handoff refs
  - not_proven
forbidden_return_keys:
  - success
  - failure
  - approved
  - quality
  - movement_choice
  - route_target
proof_limits:
  - Brick-owned return-shape data resource only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - future Building Plan correctness
  - automatic shape selection
  - support loader behavior
