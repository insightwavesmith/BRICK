template_ref: brick-template:plan-return
owner_axis: Brick
template_kind: plan_return_shape
maps_to: AgentFact.returned
step_template_refs:
  - building-step-template:plan
required_return_shape:
  - objective_summary
  - scope_boundaries
  - constraints
  - missing_scope
  - proposed_next_work_boundaries
  - observed_evidence
  - not_proven
  - transition_concern_evidence
# HANDOFF subset carried inline to design / first work; support FILTERS to these.
# Common envelope (observed_evidence, not_proven, transition_concern_evidence)
# stays LOCAL. Every field is a member of required_return_shape above.
carries_forward_fields:
  - scope_boundaries
  - constraints
  - proposed_next_work_boundaries
next_link_input_sections:
  - public facts available for Link
  - missing facts for Link Gate
  - handoff refs
  - not_proven
forbidden_return_keys:
  - success
  - failure
  - approved
  - quality
  - movement_choice
  - route_target
proof_limits:
  - Brick-owned return-shape data resource only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - future Building Plan correctness
  - automatic shape selection
  - support loader behavior
