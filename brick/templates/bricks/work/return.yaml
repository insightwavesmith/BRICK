template_ref: brick-template:work-return
owner_axis: Brick
template_kind: work_return_shape
maps_to: AgentFact.returned
step_template_refs:
  - building-step-template:work
required_return_shape:
  - received_work_ref
  - made_changes
  - changed_files
  - observed_evidence
  - commands_run
  - blocked_or_missing_evidence
  - handoff_refs
  - not_proven
# HANDOFF subset of required_return_shape carried inline to the DOWNSTREAM worker
# (the "쪽지"); support FILTERS the carried summary to these before it becomes the
# next node's source_facts. Common envelope (observed_evidence, not_proven,
# received_work_ref, blocked_or_missing_evidence, ...) stays LOCAL. Every field is
# a member of required_return_shape above. downstream = code-attack-qa,
# axis-attack-qa, evidence-integrity.
carries_forward_fields:
  - made_changes
  - changed_files
  - commands_run
  - handoff_refs
next_link_input_sections:
  - public facts available for Link
  - missing facts for Link Gate
  - handoff refs
  - not_proven
rules:
  - declared proof_obligations are machine-executed after return; run each declared command yourself before returning. If an obligation contradicts the work statement (it names files or commands the Deliverables never mention), do not grind against it — raise an insufficient_input concern in round one citing the contradiction (0704 measured; a contaminated order ground 6 rounds that one concern would have ended).
  - made_changes reports the factual write outcome; support overwrites changed_files from the measured diff (write observation), so the two must not contradict.
  - made_changes true with empty changed_files is a contradiction, not a completion; declare no_changes_reason (the made_changes waiver) or report the gap under blocked_or_missing_evidence.
  - never imply implementation completion in prose when changed_files carries no real diff artifact; the gap belongs under blocked_or_missing_evidence / not_proven (0702 fake-landing).
forbidden_return_keys:
  - success
  - failure
  - approved
  - quality
  - good_enough
  - movement_choice
  - route_target
proof_limits:
  - Brick-owned return-shape data resource only
  - changed files are support evidence only
  - checker green is support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic correctness of changed files
  - complete coverage
  - support loader behavior
