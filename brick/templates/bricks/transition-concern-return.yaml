template_ref: brick-template:standard-transition-concern-return
owner_axis: Brick
template_kind: review_return_shape
returned_shape:
  transition_concern_evidence:
    # Use null or omit transition_concern_evidence when there is no concern.
    # Never use {} as a no-concern placeholder; a present mapping must be a
    # complete concern object and malformed mappings fail closed.
    concern_ref: transition-concern:<id>
    concern_kind: implementation_gap | design_gap | upstream_gap | boundary_mismatch | insufficient_input | replay_needed | verification_gap | unknown
    reason_refs:
      - observation:<id>
    # For concerns that may be adopted for reroute/replay, reason_refs must be
    # current Building ledger addresses resolvable from this run's recorded rows.
    # Only the current Building work/step-outputs document path form may contain
    # a slash.
    # A slash-containing reason_refs address must name an existing step-output
    # document under this Building's work/step-outputs/ subtree, with no
    # #fragment. Put step-output refs with fragments, bare file:line citations,
    # non-step-output slash paths, any other slash-containing document paths,
    # descriptive refs, external files, prior Building evidence paths, URLs, or
    # packet labels under
    # observed_evidence / evidence_used / checked_sources instead, or use a
    # slashless opaque token such as observation:<id>.
    # Reroute-eligible defect kinds (implementation_gap, design_gap, upstream_gap,
    # boundary_mismatch, insufficient_input, replay_needed, unknown) may name the
    # upstream WORK node responsible for the defect. Admitted forms are the plain
    # declared node id or brick:<declared-node>, brick-instance:<declared-node>,
    # and brick-boundary:<declared-node> — NOT the reporting node itself, NOT a
    # building-boundary: sentinel.
    # verification_gap is non-reroute evidence: record it with empty refs or a
    # building-boundary: sentinel, never with a Brick-node reroute address.
    # The engine silently walks-on a self-ref or sentinel, so no reroute fires.
    related_boundary_refs:
      - brick:<upstream-work-node-id>
    binding: false
    proof_limits:
      - Agent concern only
      - not Movement authority
forbidden_transition_concern_fields:
  - movement
  - target
  - target_ref
  - route_target
  - success
  - failure
  - approved
  - quality
proof_limits:
  - transition_concern_evidence is Agent returned evidence only
  - Link owns Movement and target disposition
  - not route policy matching
  - not route materialization
  - not automatic repair/replay execution
