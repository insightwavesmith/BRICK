template_ref: brick-template:axis-attack-qa-return
owner_axis: Brick
template_kind: axis_attack_qa_return_shape
maps_to: AgentFact.returned
step_template_refs:
  - building-step-template:axis-attack-qa
required_return_shape:
  - observed_evidence
  - attacked_scope
  - brick_axis_findings
  - agent_axis_findings
  - link_axis_findings
  - support_leak_findings
  - projection_authority_findings
  - transition_concern_evidence
  - evidence_used
  - not_proven
# HANDOFF subset carried inline to closure; support FILTERS to these. Common
# envelope (observed_evidence, evidence_used, transition_concern_evidence,
# not_proven) stays LOCAL. Every field is a member of required_return_shape
# above. downstream = closure.
# transition_concern_evidence.reason_refs address rule: only the current
# Building work/step-outputs document path form may contain a slash. Such refs
# must be existing step-output documents under this Building's work/step-outputs/
# subtree, with no #fragment; step-output fragments, bare file:line citations,
# non-step-output slash paths, any other slash-containing document paths, and
# descriptive refs belong under observed_evidence / evidence_used /
# checked_sources, or as slashless opaque tokens such as observation:<id>.
carries_forward_fields:
  - attacked_scope
  - brick_axis_findings
  - agent_axis_findings
  - link_axis_findings
  - support_leak_findings
  - projection_authority_findings
next_link_input_sections:
  - observed public facts for Link
  - missing facts for Link Gate
  - axis attack evidence refs
  - non-binding transition_concern_evidence
  - not_proven
forbidden_return_keys:
  - success
  - failure
  - approved
  - quality
  - movement_choice
  - route_target
proof_limits:
  - Brick-owned return-shape data resource only
  - axis attack evidence is not reviewer authority
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - complete absence of future support authority leaks
  - support loader behavior
