template_ref: brick-template:closure-return
owner_axis: Brick
description: Standard BAR-v2 closure return shape for carrying a parent objective across child phases.
required_return_shape:
  - observed_evidence
  - narrowly_proven
  - not_proven
  - remaining_delta
  - parent_goal_delta_status
  - next_target_candidates
  - deferred_smith_review_queue
  - transition_concern_evidence
  - deliverable_crosscheck
# HANDOFF subset carried inline to the parent goal / next building; support
# FILTERS to these. Common envelope (observed_evidence, not_proven,
# transition_concern_evidence) and the record-only deferred_smith_review_queue
# stay LOCAL. Every field is a member of required_return_shape above.
# transition_concern_evidence.reason_refs address rule: only the current
# Building work/step-outputs document path form may contain a slash. Such refs
# must be existing step-output documents under this Building's work/step-outputs/
# subtree, with no #fragment; step-output fragments, bare file:line citations,
# non-step-output slash paths, any other slash-containing document paths, and
# descriptive refs belong under observed_evidence / evidence_used /
# checked_sources, or as slashless opaque tokens such as observation:<id>.
carries_forward_fields:
  - narrowly_proven
  - remaining_delta
  - parent_goal_delta_status
  - next_target_candidates
parent_goal_delta_status:
  allowed_fields:
    - matched_delta_refs
    - closed_delta_refs
    - open_delta_refs
    - missing_delta_refs
    - unknown_delta_refs
    - evidence_refs
# Per-numbered-deliverable audit row; stays LOCAL (not carried forward). A
# future Link-side completion gate consumes this declared field — the field is
# the declaration, the gate is a later consumer (0702 fake-landing postmortem).
deliverable_crosscheck:
  allowed_fields:
    - deliverable_ref
    - implementation_status
    - diff_artifact_refs
    - evidence_refs
  allowed_implementation_status:
    - implemented
    - partial
    - not_implemented
    - not_applicable_read_only
rules:
  - parent_goal_delta_status is observation language, not a percentage.
  - not_proven is next-target material, not a failure verdict.
  - remaining_delta must name concrete future work candidates.
  - proof scope may narrow, but objective scope must be carried.
  - transition_concern_evidence is null or absent when there is no real concern; never use an empty mapping.
  - deliverable_crosscheck lists every numbered task deliverable; implementation_status is observation language, not a verdict.
  - an implementation deliverable row with empty diff_artifact_refs must be accompanied by transition_concern_evidence (implementation_gap), never by a complete-style return.
forbidden_return_keys:
  - success
  - failure
  - approved
  - good_enough
  - movement_choice
  - route_target
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic correctness of future phases
  - automatic route policy correctness
  - automatic repair/replay behavior
  - child Building generation behavior
