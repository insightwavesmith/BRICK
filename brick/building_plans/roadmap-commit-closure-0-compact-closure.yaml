plan_ref: building-plan:roadmap-commit-closure-0-compact-closure
owner_axis: Brick
building_id: roadmap-commit-closure-0-0525
plan_shape: linear
selected_adapter_ref: adapter:local
coo_preflight_questions:
  - What Brick work is being closed?
  - Which Agent Object receives each Building step?
  - Which Link row declares the next Movement and target?
  - If validation fails, is the next Movement a Link-owned return to the previous verification boundary or a reroute to a repair Building?
  - Does the evidence root preserve capture, raw, claim_trace, and building-map support projection?
  - Does any support surface choose route, retry, target, Movement, GateFact, success, or quality?
link_transition_policy:
  - A one-step back repair is Link movement return to the previous Brick boundary.
  - A multi-step repair is Link movement reroute with declared target and replay handoff refs.
  - support/operator/run.py walks only declared Link Movement and target rows.
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic correctness of all roadmap slices
  - future graph-ready writer enforcement
  - future MCP or toolkit installation
  - future provider-native session resume
steps:
  - step_ref: roadmap-commit-closure-0-01-preflight
    selected_adapter_ref: adapter:local
    rows:
      - axis: Brick
        row_ref: brick-row:roadmap-commit-closure-preflight
        brick_work_ref: work:roadmap-commit-closure-preflight
        brick_instance_ref: brick-roadmap-commit-closure-preflight-01
        work_statement: Preflight the dirty BUILDING-AUTOMATION-ROADMAP-0 closure set before validation and commit.
        comparison_rule: Observe whether the closure set has a declared Building Plan, evidence roots, support records, checker files, and no unrelated root drift.
        required_return_shape: dirty_scope, building_roots, support_records, coo_questions_checked, proof_limits, not_proven
        source_facts:
          - AGENTS.md
          - project/brick-protocol/status/kernel/current-working-context.md
      - axis: Agent
        row_ref: agent-row:roadmap-commit-closure-preflight
        agent_object_ref: agent-object:coo
      - axis: Link
        row_ref: link-row:roadmap-commit-closure-preflight-to-validation
        movement: forward
        target_ref: brick-roadmap-commit-closure-validation-02
        next_brick_instance_ref: brick-roadmap-commit-closure-validation-02
  - step_ref: roadmap-commit-closure-0-02-validation
    selected_adapter_ref: adapter:local
    rows:
      - axis: Brick
        row_ref: brick-row:roadmap-commit-closure-validation
        brick_work_ref: work:roadmap-commit-closure-validation
        brick_instance_ref: brick-roadmap-commit-closure-validation-02
        work_statement: Run the roadmap closure validation bundle and record whether repair is needed before commit.
        comparison_rule: Validation failure must not be patched ad hoc; it must be carried by Link as return to this verification boundary or reroute to a repair Building.
        required_return_shape: checker_bundle, pass_fail_observations, repair_needed, return_or_reroute_candidate, proof_limits, not_proven
        source_facts:
          - support/checkers/check_package_path_admission.py
          - support/checkers/check_axis_contract_projection.py
          - support/checkers/check_building_lifecycle_path_shape.py
          - support/checkers/check_building_graph_import.py
      - axis: Agent
        row_ref: agent-row:roadmap-commit-closure-validation
        agent_object_ref: agent-object:qa
      - axis: Link
        row_ref: link-row:roadmap-commit-closure-validation-to-git-candidate
        movement: forward
        target_ref: brick-roadmap-commit-closure-git-candidate-03
        next_brick_instance_ref: brick-roadmap-commit-closure-git-candidate-03
  - step_ref: roadmap-commit-closure-0-03-git-candidate
    selected_adapter_ref: adapter:local
    rows:
      - axis: Brick
        row_ref: brick-row:roadmap-commit-closure-git-candidate
        brick_work_ref: work:roadmap-commit-closure-git-candidate
        brick_instance_ref: brick-roadmap-commit-closure-git-candidate-03
        work_statement: Prepare the scoped git closure candidate after validation passes.
        comparison_rule: Commit and push are outside operator helper automation; COO may run explicit git commands only after validation evidence is observed.
        required_return_shape: staged_scope, excluded_scope, commit_message_candidate, push_target, proof_limits, not_proven
        source_facts:
          - project/brick-protocol/status/kernel/current-working-context.md
          - support/docs/spec/brick-protocol-building-automation-roadmap-0-three-axis-automation-0525.md
      - axis: Agent
        row_ref: agent-row:roadmap-commit-closure-git-candidate
        agent_object_ref: agent-object:coo
      - axis: Link
        row_ref: link-row:roadmap-commit-closure-git-candidate-to-closure
        movement: forward
        target_ref: brick-roadmap-commit-closure-closure-04
        next_brick_instance_ref: brick-roadmap-commit-closure-closure-04
  - step_ref: roadmap-commit-closure-0-04-closure
    selected_adapter_ref: adapter:local
    rows:
      - axis: Brick
        row_ref: brick-row:roadmap-commit-closure-closure
        brick_work_ref: work:roadmap-commit-closure-closure
        brick_instance_ref: brick-roadmap-commit-closure-closure-04
        work_statement: Close ROADMAP-COMMIT-CLOSURE-0 with observed evidence and next COO Movement.
        comparison_rule: Preserve observed evidence, narrow proof, not-proven, held, and next Movement only.
        required_return_shape: observed_evidence, narrowly_proven, not_proven, held, coo_movement
        source_facts:
          - brick/building_plans/roadmap-commit-closure-0-compact-closure.yaml
          - project/brick-protocol/status/kernel/current-working-context.md
      - axis: Agent
        row_ref: agent-row:roadmap-commit-closure-closure
        agent_object_ref: agent-object:coo
      - axis: Link
        row_ref: link-row:roadmap-commit-closure-closure-to-boundary
        movement: forward
        building_lifecycle:
          state: closed
          reason: superseded stop Movement moved to Building lifecycle close state by MOVEMENT-BINARY-0
        target_ref: building-boundary:roadmap-commit-closure-0-closed
        next_brick_instance_ref: building-boundary-roadmap-commit-closure-0-closed
