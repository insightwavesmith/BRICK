          comparison_rule: Observe support evidence only; closure is not Movement authority.
          required_return_shape: observed_evidence, not_proven
      edges:
        - edge_ref: edge:c1-omit-work-to-review
          source: c1-omit-work
          target: c1-omit-review
          movement: forward
        - edge_ref: edge:c1-omit-review-to-closure
          source: c1-omit-review
          target: c1-omit-closure
          movement: forward
          gate: human
        - edge_ref: edge:c1-omit-closure-to-boundary
          source: c1-omit-closure
          target: building-boundary:c1-compose-profile-omitted-shape-closed
          movement: forward
          building_lifecycle:
            state: closed
            reason: c1 compose profile omitted-shape closed
    expected:
      plan_shape: graph
      selected_adapter_ref: adapter:local
      declared_gate_refs:
        - link-gate:default-transition
        - link-gate:human
      frontier_kind: complete
      declaration_evidence:
        plan_shape: graph
