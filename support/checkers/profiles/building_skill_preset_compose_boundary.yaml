          comparison_rule: Observe support evidence only; do not choose Movement or judge quality.
          required_return_shape: observed_evidence, not_proven
        - node_id: c1-profile-review
          step_template_ref: building-step-template:review
          work_statement: Review C1 profile work.
          comparison_rule: Observe support evidence only; do not choose Movement or judge quality.
          required_return_shape: observed_evidence, not_proven
        - node_id: c1-profile-closure
          step_template_ref: building-step-template:closure
          work_statement: Close C1 profile composition proof.
          comparison_rule: Observe support evidence only; closure is not Movement authority.
          required_return_shape: observed_evidence, not_proven
      edges:
        - edge_ref: edge:c1-profile-work-to-review
          source: c1-profile-work
          target: c1-profile-review
          movement: forward
        - edge_ref: edge:c1-profile-review-to-closure
          source: c1-profile-review
          target: c1-profile-closure
          movement: forward
          gate: human
        - edge_ref: edge:c1-profile-closure-to-boundary
          source: c1-profile-closure
          target: building-boundary:c1-compose-profile-positive-closed
          movement: forward
          building_lifecycle:
            state: closed
            reason: c1 compose profile positive closed
    expected:
      plan_shape: graph
      selected_adapter_ref: adapter:local
      declared_gate_refs:
        - link-gate:default-transition
        - link-gate:human
      frontier_kind: complete
      declaration_evidence:
        plan_shape: graph
        selected_shape_ref: building-shape:reviewable-work
        expanded_step_template_refs:
          - building-step-template:work
          - building-step-template:review
          - building-step-template:closure
        expanded_brick_spec_refs:
          - brick/templates/bricks/work/brick.md
          - brick/templates/bricks/review/brick.md
          - brick/templates/bricks/closure/brick.md
        expanded_brick_template_refs:
          - brick/templates/bricks/work/return.yaml
          - brick/templates/bricks/review/return.yaml
          - brick/templates/bricks/transition-concern-return.yaml
          - brick/templates/bricks/closure/return.yaml
        work_files:
          - work/task.md
          - work/building-intake.json
          - work/preset-expansion.json
          - work/declared-building-plan.json
          - work/link-launch-policy.json
  - label: c1-compose-positive-omitted-shape
    document:
      declared_by: caller
      plan_ref: building-plan:c1-compose-profile-omitted-shape
      building_id: c1-compose-profile-omitted-shape
