preset_building_completion_case:
  - label: all-current-presets-slack-alert
    task_source_ref: brick/templates/tasks/slack-alert-all-presets-task.md
    selected_adapter_ref: adapter:codex-local
    selected_model_ref: model:default
    write_scope:
      allowed_paths:
        - support/operator/**
        - support/checkers/**
        - project/brick-protocol/status/kernel/**
      forbidden_paths:
        - .git/**
        - .claude/**
    # GATE-WIRING (0610): the route_decision_basis is the CALLER-declared
    # disposition fact set for these fixture walks. The 6 review-gated presets'
    # closure rows now carry REAL [coo, human] gates, so the basis declares BOTH
    # the COO override and the human disposition -- this case is the standing
    # no-over-block guard: every preset must still COMPLETE once the declared
    # dispositions exist (and _assert_no_missing_gate_facts keeps every wired
    # gate, including strict on QA rows, fully satisfied -- not decorative).
    route_decision_basis:
      override_refs:
        - coo:all-presets-completion-smoke
      human_review_refs:
