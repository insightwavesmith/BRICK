schema: checker-profile/v1
profile_id: native-dispatch-brick-backstop
description: NATIVE-DISPATCH-BRICK-BACKSTOP-0 evidence-shape backstop asserting execution_path native-dispatch, open capture events, COMPUTED Link movement GateFact and BrickComparisonFact at close, and the agent_object binding; the optional Claude hook is config, this checker is the enforcement surface. CLEAN-YARD v3 (Smith 0611) -- the standing posA-native-complete dogfood root left for the frozen museum; the SAME posA shape pins (8 evidence files, json required paths, execution_path literal, open-capture event types, COMPUTED-gate honesty notes, no hardcoded-gate literal) are now EXECUTED 1:1 over the FRESH close tree the native_dispatch_close_case generates per run (_assert_native_dispatch_pos_a_shape).
kernel_checks:
  - package_path_admission
  - building_lifecycle_path_shape
  - building_map_graph
path_exists:
  - agent/performance.py
  - support/connection/agent_resources.py
  - support/operator/building_operation.py
  - agent/skills/native-dispatch-recording/SKILL.md
path_absent:
  - agent/skills/native-dispatch-recording/open-recording.py
  - agent/skills/native-dispatch-recording/close-recording.py
  - agent/skills/native-dispatch-recording/open-recording.sh
  - agent/skills/native-dispatch-recording/close-recording.sh
text_contains:
  # CLEAN-YARD v3: the posA shape fold must stay an EXECUTED case property set
  # inside the close-case seam (generation + 1:1 migrated pin tables); these
  # needles RED if the fold or its property tables are removed.
  - path: support/checkers/lib/case_runners.py
    texts:
      - _assert_native_dispatch_pos_a_shape
      - _POS_A_JSON_REQUIRED
      - _POS_A_TEXT_CONTAINS
      - _POS_A_TEXT_ABSENT
      - 'agent_bindings[].agent_performer_ref'
      - 'link_edges[].transition_fact_ref'
      - 'facts[].fact.observed_match_kind'
      - 'facts[].fact.forbidden_shortcut_evidence'
      - 'facts[].fact.required_public_facts[]'
      - 'facts[].fact.checked_public_fact'
      - '"event_type":"building_opened"'
      - '"event_type":"brick_compared"'
      - support/run did not classify Agent return
      - support/run did not judge success or quality
      - hardcoded_pass
      - forced_sufficient
  # Skill documents the convention, the marker, and the Claude-config boundary.
  - path: agent/skills/native-dispatch-recording/SKILL.md
    texts:
      - BRICK-TRACK:<building_id>
      - open -> dispatch -> gate -> close
      - open_native_dispatch_brick
      - close_native_dispatch_brick
      - Claude Code config, not the Brick engine
      - the checker backstop is the enforcement surface
  - path: agent/performance.py
    texts:
      - NATIVE_DISPATCH_PERFORMANCE_MODE = "native-dispatch"
  - path: support/connection/agent_resources.py
    texts:
      - NATIVE_DISPATCH_PERFORMANCE_MODE
      - _ALLOWED_LANES
  # ELEGANT-REFACTOR P3d: the native-dispatch open/close seam lifted to
  # operator/native_dispatch.py behind the building_operation facade
  # (location-pin-follows-rehome).
  - path: support/operator/native_dispatch.py
    texts:
      - _validate_native_dispatch_agent_object
      - native-dispatch agent_object.lane must be native-dispatch
      - native-dispatch agent_object unknown keys
# Behavioral FIRE cases driving the real open/close seam: forced-verdict (HOLE A)
# and smuggled-Movement (HOLE B) must RAISE; forward default + legit reroute must
# PASS. These RED if either guard in close_native_dispatch_brick is removed.
native_dispatch_close_case:
  - label: native-dispatch-close-governance
text_absent:
  # The skill must not stage a runnable hook executable in the repo tree; the
  # hook scripts are documented templates, staged under /tmp only for a proof.
  # (The COMPUTED-gate text_absent over the sufficiency trace migrated into
  # _POS_A_TEXT_ABSENT, executed over the fresh close tree each run.)
  - path: agent/skills/native-dispatch-recording/SKILL.md
    texts:
      - the hook is the enforcement surface
proof_limits:
  - support evidence only
  - native-dispatch backstop checks evidence SHAPE, not semantic correctness
  - the COMPUTED gate verdict value (sufficient / missing_required_facts) is the Link rule output, not asserted by this profile
  - the optional Claude Pre/PostToolUse hook is Claude Code config, not the Brick engine
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - semantic correctness of the recorded native dispatch
  - whether a live Claude hook is wired (this profile does not read settings.json)
  - future provider or subagent behavior
  - production runtime readiness
