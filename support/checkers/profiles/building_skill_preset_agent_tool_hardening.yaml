  # the 0527 spec doc to AGENTS.md (live constitution); 'native hook execution'
  # closure enforced by hook_registry_axis_case (execution_opened rejected).
  - path: AGENTS.md
    texts:
      - 'Building skill -> chain preset -> step template -> Agent Object -> tool / hook guardrail'
      - 'Ask six questions: Brick, Agent, Link, Support, Evidence, Admission.'
  - path: agent/prompts/coo.md
    texts:
      - MOVEMENT-BINARY-0 as the active Link language
      - Older historical docs or evidence may still contain return / hold / stop / pass.
      - Building-intake trigger
      - 빌딩 만들자
      - 빌딩 구성하자
      - task intake 하자
      - ask one core question
      - 이 뜻 맞나?
      - task_source_draft
      - task-source confirmed first
      - Do not start from
      - selected_shape_ref
      - active_plan_ref
  - path: agent/skills/building-coordination/SKILL.md
    texts:
      - use the active MOVEMENT-BINARY-0 language
      - Older historical docs or evidence may still show wider Movement vocabulary
      - Building trigger rule
      - 빌딩 기획하자
      - 빌딩 플랜 잡자
      - 빌딩 실행하자
      - conversational loop
      - ask a batch checklist
      - Open COO intake questions before implementation.
      - active startup order
      - Run `task_intake` as the first active work step
      - Confirm `task_source_draft`
      - support records `work/task.md` as declaration evidence
      - Builder materializer handoff
      - After those declarations
      - chain_preset_ref
      - no_preset_fallback
      - route_family_candidate
      - preset_vs_manual_case_analysis
      - graph_movement_case_analysis
      - fan_in_first_candidate
      - reroute_replay_candidate
      - partial QA reuse remains not_proven
      - brick/templates/presets/
      - run_declared_auto_repair_replay_case
  - path: agent/skills/task_intake/SKILL.md
    texts:
      - route_family_candidate
      - preset_vs_manual_candidate
      - preset_vs_manual_case_analysis
      - manual_graph_candidate
      - graph_movement_case_analysis
      - fan_out_candidate
      - fan_in_first_candidate
      - fan_in_frontier_candidate
      - reroute_replay_readiness_questions
      - declared_boundary_candidate_refs
      - route_policy_candidate_refs
      - route_replay_plan_candidate_refs
      - payload_delivery_scope_notes
      - claim partial QA reuse is valid without consumed_input_refs
  - path: agent/prompts/coo.md
    texts:
      - route_family_candidate
      - graph_movement_case_analysis
      - fan_in_first_candidate
      - Slack is the payload
      - closure-synthesis
      - Partial QA reuse remains
  - path: support/connection/agent_resources.py
    texts:
      - native hook execution remains closed
      - leader lane must carry hook:leader-write-need-gate
      - reviewer lane must carry hook:reviewer-no-mutation
      # WAVE-B (0610): retired-name loud reject -- the resolver must keep
      # naming the canonical replacement, never a vague missing-file error.
      - retired tool policy ref
      - retired hook ref
      - leader lane must carry tool-policy:leader-coordination
      - A reviewer MAY carry tool-policy:probe-write-scoped
      - work-area write CAPABILITY
      - semantic_capability_classes are Agent policy class evidence
  - path: brick/spec.py
    texts:
      - capability_class
      - Non-authoritative capability taxonomy label
      - lowered.startswith("/")
  - path: support/operator/plan_rendering.py
    texts:
      - _frontmatter_capability_class
      - capability_class
  - path: support/operator/composition_compose.py
    texts:
      - capability_class
  - path: support/operator/composition_graph_emit.py
    texts:
      - capability_class
  - path: support/connection/agent_adapter.py
    texts:
      - _RETURN_WAIVER_FIELDS_BY_REQUIRED
      - return_field_waivers
      - no_changes_reason
      - def agent_request_read_tier
  # MODULE-SEP god-module split (route-B, facade removed): the read-only
  # tool-policy ref set relocated to the adapter_constants.py leaf; the pin
  # follows the moved symbol to its real new home.
  - path: support/connection/adapter_constants.py
    texts:
      - READ_ONLY_TOOL_POLICY_REFS
  # MODULE-SEP god-module split: the native-grant read-tier rule prose relocated
  # to the adapter_grant_policy.py sibling; these text pins follow the moved
  # strings to their real new home.
  - path: support/connection/adapter_grant_policy.py
    texts:
      - read-only repository inspection tools only
      - Gemini local native grant may use only read_file, glob, grep_search, search_file_content, list_directory, read_many_files, and when web-capable is present google_web_search/web_fetch; write and shell tools remain blocked.
  - path: agent/tool_policies/read-write-scoped.yaml
    texts:
      - semantic_capability_classes
      - probe_write
      - verification_write
      - source_write
      - artifact_write
  - path: agent/tool_policies/probe-write-scoped.yaml
    texts:
      - semantic_capability_classes
      - probe_write
      - verification_write
      - source_write
      - artifact_write
  - path: support/checkers/lib/case_runners.py
    texts:
      - agent_object_hashes_unchanged
      - _agent_object_file_digests
  - path: support/operator/plan_validation.py
    texts:
      - evidence_used.repository_artifact_ref
      - evidence_refs.repository_artifact_ref
  - path: brick/spec.py
    texts:
      - artifact_grounding_missing
  - path: brick/templates/bricks/code-attack-qa/brick.md
    texts:
      - "`evidence_used` MUST include inspected repository artifact references"
  - path: brick/templates/bricks/design/brick.md
    texts:
      - "`evidence_refs` MUST include inspected repository artifact references"
  - path: support/operator/run.py
    texts:
      - validate_agent_refs
      - Agent Object resource rejected by Agent resource resolver
  - path: support/connection/building_design_toolkit.py
    texts:
      - step_templates
      - chain_presets
      - _registry_section_items
      # PART-2 Phase 3 READ-ONLY agent-candidate COO surface (pin the helper +
      # its axis law: support records candidates, does not pick among >= 2).
      - 'def render_agent_candidate_packet('
      - support does not pick among >= 2 candidates
  - path: support/operator/plan_rendering.py
    texts:
      - 'def _render_candidate_agents_for_need('
      - does NOT pick among >=2
  - path: brick/templates/presets/app-feature-basic.md
    texts:
      - "preset_ref: building-chain-preset:app-feature-basic"
      - "## Route"
  - path: support/checkers/check_profile.py
    texts:
      - declared_step_template_plan_rejects
      - compose_building_case
      - compose_building_rejects
      - source_fact_body_carry_case
      - wiki_carry_truncation_survival_case
      - step_output_drain_case
      - step_output_drain_rejects
  # ELEGANT-REFACTOR P3d / MODULE-SEP: compose_building + selection_rule live in
  # composition_compose.py, the CompositionError/CompositionProblem error types
  # in composition_problem.py (composition.py was decomposed into single-concern
  # siblings and removed). The pin tracks each to its real home (same assertion,
  # new path).
  - path: support/operator/composition_compose.py
    texts:
      - 'def compose_building('
      - selection_rule
      - caller_or_coo_declared_only
  - path: support/operator/composition_problem.py
    texts:
      - class CompositionError(ValueError)
      - class CompositionProblem
  - path: support/operator/composition_compose.py
    texts:
      - 'selection_rule: caller_or_coo_declared_only'
