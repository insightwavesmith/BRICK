# re-truncated by safe_source_fact_body downstream (agent adapter floors the
# carried body AGAIN at limit 12000 / gemini 4000, tail-cut). PATH/NOTE lead the
# view, SUMMARY trails, so a large `returned` only loses its summary tail. This
