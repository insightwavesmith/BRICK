    agent_object:
      lane: reviewer
      hook_refs:
        - hook:instruction-chain-read
        - hook:reviewer-no-mutation
        - hook:unsafe-mutation-guard
        - hook:resource-ref-redaction
      tool_policy_refs:
        - tool-policy:reviewer-readonly
      adapter_refs:
        - adapter:local
      preferred_adapter_ref: adapter:codex-local
  - expected_message: preferred_model_ref requires preferred_adapter_ref
