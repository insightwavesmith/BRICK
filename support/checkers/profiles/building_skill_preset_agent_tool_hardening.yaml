      - 'def render_agent_candidate_packet('
      - support does not pick among >= 2 candidates
  - path: support/operator/plan_rendering.py
    texts:
      - 'def _render_candidate_agents_for_need('
      - does NOT pick among >=2
  - path: brick/templates/presets/app-feature-basic.md
    texts:
      - "preset_ref: building-chain-preset:app-feature-basic"
      - "## Route"
  - path: support/checkers/check_profile.py
    texts:
      - declared_step_template_plan_rejects
      - compose_building_case
      - compose_building_rejects
      - source_fact_body_carry_case
      - wiki_carry_truncation_survival_case
      - step_output_drain_case
      - step_output_drain_rejects
  # ELEGANT-REFACTOR P3d / MODULE-SEP: compose_building + selection_rule live in
  # composition_compose.py, the CompositionError/CompositionProblem error types
  # in composition_problem.py (composition.py was decomposed into single-concern
  # siblings and removed). The pin tracks each to its real home (same assertion,
  # new path).
  - path: support/operator/composition_compose.py
    texts:
      - 'def compose_building('
      - selection_rule
      - caller_or_coo_declared_only
  - path: support/operator/composition_problem.py
    texts:
      - class CompositionError(ValueError)
      - class CompositionProblem
  - path: support/operator/composition_compose.py
    texts:
      - 'selection_rule: caller_or_coo_declared_only'
  # REHOME from retiring legacy_agent_harness_system profile (guard-before-retire):
  # these legacy agent-harness surfaces had ZERO other enforcer.
  - path: support/connection/agent_resources.py
    texts:
      - render_agent_team_context
      - provider-specific Agent identity is not admitted
      - write-capable adapter_refs remain technical capability refs, not authority
      - write authority requires Brick write_scope plus Agent write policy plus adapter capability plus write observation
  - path: support/connection/mcp_projection.py
    texts:
      - brick_protocol_render_agent_team_context
      - brick-protocol://agent/team/context
json_required_paths:
