# FIX-C (codex review 0611): run_building_once TASK-SOURCE ADMISSION, parity
# with run_building_plan strictness (P11b). Before the fix the single-step
# surface validated NO task_source_ref: a once-packet declaring a missing task
# file silently skipped the body (_source_fact_bodies -> {}) and ran without
# its declared task. The runner FIREs four legs against the REAL
# run_building_once wiring with a provider command-runner sentinel: (1)
# missing repo-path ref -> VERBATIM reject ("task_source_ref declared file
# does not exist: ...") BEFORE the provider boundary; (2) the SAME packet with
# an existing file proceeds to the provider sentinel (no over-restriction);
# (3) the inline sentinel ref without a carried task_statement body rejects;
# (4) with the body it proceeds -- both task-source forms stay honest on the
# once surface. Anti-tautology: removing the run_building_once admission
# guard sends legs (1)/(3) into the provider sentinel and the case REDs.
run_once_task_source_admission_case:
  - label: once-task-source-admission
    missing_task_source_ref: brick/templates/tasks/this-once-task-source-does-not-exist.md
    valid_task_source_ref: brick/templates/tasks/source-template.md
