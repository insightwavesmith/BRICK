# the repro shape of brick/building_plans/building-automation-complete-0-scope-c-
# dogfood.yaml rows) and walks the REAL linear runner over adapter:local: the
# CLI prompt actually sent must ask the full union (base fields in declared
# order + the default-gate field appended). The OLD Brick-shape-only under-ask
# REDs this (the prompt would lack observed_evidence). passthrough_step_index
# pins the other half on the UNTOUCHED review row: gates adding nothing -> the
# declared labels pass through verbatim (so a blanket over-ask cannot fake the
# fix). NOT byte-neutral by design for legacy under-asking rows -- documented at
# the run.py seam; legacy stored plans stay strict-blocked for re-runs.
