      - adapter:codex-local
    forbidden_adapter_refs:
      - adapter:codex-write-local
      - adapter:claude-write-local
    hooks_execution_opened: false
  # C4 (0615): QA-attack's true nature is to verify by WRITING (run real
  # checkers / FIRE / mutation probes in the building WORK-AREA inside the W1
