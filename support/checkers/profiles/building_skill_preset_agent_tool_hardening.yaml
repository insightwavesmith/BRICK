# PART-2 Phase 1 CORE PRODUCT SEAM: the single task.md + chain preset ->
# running-Building verb (support/operator/driver.py run_building_intake). This
# case drives it over an adapter:local deterministic agent brain end-to-end and
# asserts: (1) it writes the materialized graph plan to disk, (2) it records
# dynamic dispatch while letting run_building_plan derive it from graph shape,
# and (3) it reaches a terminal frontier with Building evidence. The
# no_preset_chain_preset_ref FIRE asserts the seam HARD-FAILS (does not run a
# Building) when the intent names a preset absent from the registry.
building_intake_seam_case:
  # Preferred-adapter default seam coverage on a NON-QA, no-write-need preset.
  # onboarding-example-graph is the design->review->closure graph (no work step,
  # no write_scope NEED), so the deterministic non-local seam still walks the
  # dynamic walker to a complete frontier while omitted per-step adapters resolve
  # through Agent Object preferred_adapter_ref. The governed-change-review
  # GATE-WIRING coverage stays in the codex-local fixtures below (where the
  # write-needing QA bricks are walked for real).
  - label: building-intake-seam-graph-preferred-claude
    task_source_ref: brick/templates/tasks/source-template.md
    chain_preset_ref: building-chain-preset:onboarding-example-graph
    selected_adapter_ref: adapter:claude-local
    expected_plan_shape: graph
    expected_walker_mode: dynamic
    expected_frontier_kind: complete
    no_preset_chain_preset_ref: building-chain-preset:this-preset-is-not-in-the-registry
  # TASK-BY-TEXT (0611, Smith ruling; codex FIX-A): humans SPEAK tasks; the
  # machine records them as building evidence. An intent with task_statement
  # (inline text, NO task_source_ref) must complete through the SAME seam,
  # land the statement VERBATIM as the building's work/task.md, record
  # task_source_basis == task_statement, and create NO repo-root
  # task-statement file AT ANY POINT (the runner probes the repo-root glob
  # DURING the run from inside the seam callable -- a regression back to the
  # retired transient ephemeral-file mechanism REDs mid-walk, not just
  # after). The persisted declared plan must CARRY the statement
  # (task_source_ref == task-source:inline-statement + task_statement body)
  # and REPLAYING that plan file must reproduce work/task.md verbatim (codex
  # Vector C). The runner also FIREs the fail-closed set: BOTH sources ->
  # reject with the EITHER/OR message; empty task_statement -> reject;
  # oversize (>64KiB) statement -> reject; and FIX-IDEMPOTENCY -- with
  # building_id absent the default id is a STABLE hash of (statement +
  # preset): same pair -> same id (retry collides loudly on the existing
  # root), different statement -> different id.
  - label: building-intake-seam-task-statement
    task_statement: "온보딩 화면의 환영 문구를 한 줄로 다듬어 주세요. 맥락: 첫 화면이 너무 딱딱하다는 피드백."
    chain_preset_ref: building-chain-preset:governed-change-review
    # C4 (0615): governed-change-review's QA bricks (axis-attack-qa,
    # code-attack-qa) now declare a write NEED, so the intent carries a broad
    # work-area write_scope and drives adapter:codex-local through the existing
    # command_runner sentinel (no real CLI). The W1 worktree sandboxes the
    # work-area write; .git/secret/token stay UNCONDITIONALLY forbidden by
    # write_observation.py regardless of allowed_paths.
    selected_adapter_ref: adapter:codex-local
    write_scope:
      allowed_paths:
        - "**"
      forbidden_paths:
        - ".git/**"
    expected_plan_shape: graph
    expected_walker_mode: dynamic
    expected_frontier_kind: complete
    route_decision_basis:
      override_refs:
        - coo:intake-seam-task-statement-override
      human_review_refs:
        - human-review:intake-seam-task-statement-disposition
    no_preset_chain_preset_ref: building-chain-preset:this-preset-is-not-in-the-registry
  # GATE-WIRING FIRE (c) (0610): the SAME preset walked WITHOUT a human
  # disposition (COO override supplied, human_review_refs absent) must HOLD at
  # the closure human gate via the EXISTING gate-sequence hold path: frontier
  # link_paused, required_disposition_owner caller-or-coo, paused_at names
  # link-gate:human, and the ONLY recorded missing fact is the human disposition
  # fact. REDs if the human gate goes decorative again OR if the hold fires for
  # an unrelated insufficiency. SCOPE (codex review, 0610): the human-token
  # policy is the ONLY hold surface ADDED BY THE GATE-CONCEPT TRANSLATION --
  # this case does NOT claim it is the only hold in the system; pre-existing
  # AUTHOR-declared gate_sequence_policy holds (e.g.
  # brick-protocol-engine-feature-hard's design->work coo HOLD) are untouched
  # and still hold on their own rows.
  - label: building-intake-seam-human-gate-hold
    task_source_ref: brick/templates/tasks/source-template.md
    chain_preset_ref: building-chain-preset:governed-change-review
    # C4 (0615): same write-needing QA preset as the task-statement fixture;
    # carries the broad work-area write_scope and drives adapter:codex-local
    # through the command_runner sentinel (no real CLI). The walk still HOLDS at
    # the closure human gate because the human disposition fact is absent.
    # .git/secret/token stay unconditionally forbidden by write_observation.py.
    selected_adapter_ref: adapter:codex-local
    write_scope:
      allowed_paths:
        - "**"
      forbidden_paths:
        - ".git/**"
    expected_plan_shape: graph
    expected_walker_mode: dynamic
    expected_frontier_kind: link_paused
    expected_required_disposition_owner: caller-or-coo
    expected_missing_required_fact: Link.route_decision_basis.human_review_refs
    route_decision_basis:
      override_refs:
        - coo:intake-seam-checker-override
    no_preset_chain_preset_ref: building-chain-preset:this-preset-is-not-in-the-registry
