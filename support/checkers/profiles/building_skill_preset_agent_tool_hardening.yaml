      chain_preset_ref: building-chain-preset:review-fleet
      selected_adapter_ref: adapter:local
      selected_model_ref: model:default
      # C4 (0615): work-area write_scope lets the intent materialize PAST the
      # write-need check (review-fleet's code-attack-qa needs write) and REACH
      # this case's intended per-step-adapter-not-in-agent-object rejection (the
      # adapter:chat-session override below is not on the QA Agent Object).
      # adapter:local never DRIVES a step (this intent REJECTS at materialize).
      write_scope:
        allowed_paths:
          - "**"
        forbidden_paths:
          - ".git/**"
