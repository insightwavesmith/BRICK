      lane: reviewer
      hook_refs:
        - hook:instruction-chain-read
        - hook:reviewer-no-mutation
        - hook:unsafe-mutation-guard
        - hook:resource-ref-redaction
      tool_policy_refs:
        - tool-policy:reviewer-readonly
      adapter_refs:
        - adapter:claude-local
      preferred_model_ref: model:claude:inherit
  - expected_message: preferred_model_ref rejected: selected_model_ref provider must match selected adapter
    agent_object:
      lane: reviewer
      hook_refs:
        - hook:instruction-chain-read
        - hook:reviewer-no-mutation
        - hook:unsafe-mutation-guard
        - hook:resource-ref-redaction
      tool_policy_refs:
        - tool-policy:reviewer-readonly
      adapter_refs:
        - adapter:claude-local
      preferred_adapter_ref: adapter:claude-local
      preferred_model_ref: model:codex:default
  - expected_message: preferred_model_ref requires preferred_adapter_ref with admitted model provider
    agent_object:
      lane: reviewer
      hook_refs:
        - hook:instruction-chain-read
        - hook:reviewer-no-mutation
        - hook:unsafe-mutation-guard
        - hook:resource-ref-redaction
      tool_policy_refs:
        - tool-policy:reviewer-readonly
      adapter_refs:
        - adapter:local
      preferred_adapter_ref: adapter:local
      preferred_model_ref: model:claude:inherit
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
