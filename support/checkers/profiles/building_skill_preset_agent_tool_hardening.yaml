  # U5/D5: c1-collect-all removed. Its multi-problem ("collect-all") demonstration
  # paired unknown_shape + bad_gate_token, but unknown_shape no longer fires now that
  # shape is a pure optional tag. The remaining single bad_gate_token reject is
  # already covered by the c1-bad-gate-token case above, so this case is dropped
  # rather than degraded to a redundant single-code reject.
agent_resource_boundary:
  - role: coo
    lane: leader
    preferred_adapter_ref: adapter:codex-local
    preferred_model_ref: model:codex:default
    required_hook_refs:
      - hook:leader-write-need-gate
      - hook:unsafe-mutation-guard
      - hook:resource-ref-redaction
    required_tool_policy_refs:
      - tool-policy:leader-coordination
    forbidden_tool_policy_refs:
      - tool-policy:leader-readonly
      # COO = PURE READ-ONLY (Smith ruling 0610): the Movement/judgment
      # authority carries no write tools. The four team leads MAY carry
      # tool-policy:read-write-scoped (capability >= need); the COO may NOT.
      # The NEED gate for write-capable leads is proven by
      # adapter_capability_rehome_case's
      # write_capable_leader_effective_write_gated_by_brick_scope case.
      - tool-policy:read-write-scoped
    forbidden_adapter_refs:
      - adapter:codex-write-local
      - adapter:claude-write-local
    hooks_execution_opened: false
  - role: pm-lead
    lane: leader
    preferred_adapter_ref: adapter:claude-local
    preferred_model_ref: model:claude:opus
    preferred_reasoning_effort_ref: effort:xhigh
    required_hook_refs:
      - hook:leader-write-need-gate
      - hook:unsafe-mutation-guard
      - hook:resource-ref-redaction
    required_tool_policy_refs:
      - tool-policy:leader-coordination
    forbidden_tool_policy_refs:
      - tool-policy:leader-readonly
    # leader lane MAY carry tool-policy:read-write-scoped; effective write stays
