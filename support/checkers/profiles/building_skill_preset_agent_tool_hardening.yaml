      - hooks.hook:unsafe-mutation-guard.execution_opened
text_absent:
  - path: agent/prompts/coo.md
    texts:
      - Until MOVEMENT-BINARY-0 is implemented
      - Open or point to a real Brick-owned Building Plan before changing protocol
      - Choose the Building shape by work type
  - path: agent/skills/building-coordination/SKILL.md
    texts:
      - until MOVEMENT-BINARY-0 is implemented
      - Name the Brick work contract and the Building Plan before resource changes.
      - QA branch cannot route
      - branch cannot reroute
      - closure-synthesis means final close
      - partial QA reuse without consumed_input_refs
gate_sequence_policy_case:
  - label: c1-gate-sequence-coo-first-is-admitted
    document:
      source_brick_ref: brick-design
      target_brick_ref: brick-work
      declared_brick_refs:
        - brick-design
        - brick-work
      node_reroute_budgets:
        brick-design: 1
      link_row:
        declared_gate_refs:
          - link-gate:default-transition
          - link-gate:coo
        gate_sequence_policy:
          - gate_ref: link-gate:coo
            on_missing_required_facts:
              action: HOLD
              required_disposition_owner: coo
              pending_target_basis: target_brick
            on_sufficient:
              action: next
              next_gate_ref: link-gate:default-transition
          - gate_ref: link-gate:default-transition
            on_missing_required_facts:
              action: reroute
              target_basis: source_brick
              required_target_budget: true
            on_sufficient:
              action: forward
compose_building_case:
  - label: c1-compose-graph-preset-engine-feature-hard
    document:
      selected_shape_ref: building-shape:design-needed
      declared_by: coo
      chain_preset_ref: building-chain-preset:brick-protocol-engine-feature-hard
      plan_ref: building-plan:c1-compose-graph-preset-engine-feature-hard
      building_id: c1-compose-graph-preset-engine-feature-hard
      nodes:
        - node_id: graph-design
          step_template_ref: building-step-template:design
          completion_edge_ref: edge:graph-design-to-work
          node_reroute_budget: 1
          work_statement: Design graph dogfood route.
          comparison_rule: Observe support evidence only; do not choose Movement or judge quality.
          required_return_shape: observed_evidence, not_proven
        - node_id: graph-work
          step_template_ref: building-step-template:work
          completion_edge_ref: edge:graph-work-to-code-qa
          node_reroute_budget: 1
          work_statement: Implement graph dogfood payload.
          comparison_rule: Observe support evidence only; do not choose Movement or judge quality.
          required_return_shape: made_changes, observed_evidence, not_proven
        - node_id: graph-code-qa
          step_template_ref: building-step-template:code-attack-qa
          completion_edge_ref: edge:graph-code-qa-to-closure
          work_statement: Attack implementation code.
          comparison_rule: Return the QA Brick's own fields; do not return Link-facing transition_concern_evidence.
          required_return_shape: observed_evidence, attacked_work, checked_sources, regression_risks, negative_probe_observations, failing_or_missing_probes, boundary_violations, evidence_used, not_proven
        - node_id: graph-axis-qa
          step_template_ref: building-step-template:axis-attack-qa
          completion_edge_ref: edge:graph-axis-qa-to-closure
          work_statement: Attack Brick Agent Link boundaries.
          comparison_rule: Return the axis QA Brick's own fields; do not return Link-facing transition_concern_evidence.
          required_return_shape: observed_evidence, attacked_scope, brick_axis_findings, agent_axis_findings, link_axis_findings, support_leak_findings, projection_authority_findings, evidence_used, not_proven
        - node_id: graph-evidence
          step_template_ref: building-step-template:evidence-integrity
          completion_edge_ref: edge:graph-evidence-to-closure
          work_statement: Inspect evidence integrity.
          comparison_rule: Return the evidence-integrity Brick's own fields; do not return Link-facing transition_concern_evidence.
          required_return_shape: observed_evidence, evidence_scope, persisted_evidence_roots, proof_limit_findings, stale_source_risks, checker_overclaim_risks, missing_evidence, evidence_used, not_proven
        - node_id: graph-closure
          step_template_ref: building-step-template:closure
          completion_edge_ref: edge:graph-closure-to-boundary
          work_statement: Synthesize graph dogfood evidence.
          comparison_rule: Closure-synthesis may return one non-binding transition_concern_evidence; it is not Movement authority.
          required_return_shape: observed_evidence, narrowly_proven, not_proven, remaining_delta, transition_concern_evidence
          closure_transition_target_policy:
            implementation_gap:
              action: target
              target_ref: graph-work
            verification_gap:
              action: hold
      edges:
        - edge_ref: edge:graph-design-to-work
          source: graph-design
          target: graph-work
          movement: forward
          gate: coo
          transition_lifecycle:
            state: paused
            progress_state: in_progress
            paused_at_ref: link-transition:c1-compose-graph-design-to-work
            from_brick_ref: brick-graph-design
            pending_target_ref: brick-graph-work
            required_disposition_owner: coo
            reason_refs:
              - observation:c1-compose-design-returned-before-write-scope-approval
        - edge_ref: edge:graph-work-to-code-qa
          source: graph-work
          target: graph-code-qa
          movement: forward
        - edge_ref: edge:graph-work-to-axis-qa
          source: graph-work
          target: graph-axis-qa
          movement: forward
        - edge_ref: edge:graph-work-to-evidence
          source: graph-work
          target: graph-evidence
          movement: forward
        - edge_ref: edge:graph-code-qa-to-closure
          source: graph-code-qa
          target: graph-closure
          movement: forward
        - edge_ref: edge:graph-axis-qa-to-closure
          source: graph-axis-qa
          target: graph-closure
          movement: forward
        - edge_ref: edge:graph-evidence-to-closure
          source: graph-evidence
          target: graph-closure
          movement: forward
        - edge_ref: edge:graph-closure-to-boundary
          source: graph-closure
          target: building-boundary:c1-compose-graph-preset-engine-feature-hard-closed
          movement: forward
      groups:
        - group_id: group:graph-hard-qa-fan-out
          group_role: fan_out
          member_ref_kind: link_edge
          member_refs:
            - edge:graph-work-to-code-qa
            - edge:graph-work-to-axis-qa
            - edge:graph-work-to-evidence
        - group_id: group:graph-hard-qa-fan-in
          group_role: fan_in
          member_ref_kind: link_edge
          member_refs:
            - edge:graph-code-qa-to-closure
            - edge:graph-axis-qa-to-closure
            - edge:graph-evidence-to-closure
    expected:
      plan_shape: graph
      selected_adapter_ref: adapter:local
      chain_preset_ref: building-chain-preset:brick-protocol-engine-feature-hard
      declared_gate_refs:
        - link-gate:default-transition
        - link-gate:coo
      gate_sequence_policy_gate_refs:
        - link-gate:default-transition
        - link-gate:coo
  - label: c1-compose-positive-roundtrip-dynamic
    document:
