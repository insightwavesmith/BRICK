    forbidden_adapter_refs:
      - adapter:codex-write-local
      - adapter:claude-write-local
    hooks_execution_opened: false
  - role: qa-lead
    lane: leader
    preferred_adapter_ref: adapter:codex-local
    preferred_model_ref: model:codex:default
    preferred_reasoning_effort_ref: effort:xhigh
    required_hook_refs:
      - hook:leader-write-need-gate
      - hook:unsafe-mutation-guard
      - hook:resource-ref-redaction
    required_tool_policy_refs:
      - tool-policy:leader-coordination
      - tool-policy:probe-write-scoped
    forbidden_tool_policy_refs:
      - tool-policy:leader-readonly
      - tool-policy:read-write-scoped
    # leader lane MAY carry tool-policy:read-write-scoped; effective write stays
