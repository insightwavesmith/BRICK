# leader-coordination, review-readonly -> reviewer-readonly, support-readonly
# retired outright). ABSENCE pin: a renamed file silently coming back goes RED
# here; the retired REFS rejecting loudly is pinned separately by
# agent_resource_retired_ref_rejects below.
path_absent:
