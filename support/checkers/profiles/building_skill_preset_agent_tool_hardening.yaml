      - adapter:claude-write-local
    hooks_execution_opened: false
# WAVE-B (0610) RETIRED-MAP DELETION PROBE: agent_resource_boundary above only
# validates CURRENT Agent Objects; nothing there REDs if the retired-ref map
# entries in support/connection/agent_resources.py are deleted. These items pin
# each retired ref + its SPECIFIC loud-reject message from the profile side
# (NOT derived from the maps), so deleting any _RETIRED_TOOL_POLICY_REFS /
# _RETIRED_HOOK_REFS entry goes RED here. The retired STEP-TEMPLATE entry is
# pinned by declared-step-template-plan-rejects:retired-development-step-template.
agent_resource_retired_ref_rejects:
  - ref_field: tool_policy_refs
    retired_ref: tool-policy:leader-readonly
    expected_message: "retired tool policy ref tool-policy:leader-readonly: use tool-policy:leader-coordination"
  - ref_field: tool_policy_refs
    retired_ref: tool-policy:review-readonly
    expected_message: "retired tool policy ref tool-policy:review-readonly: use tool-policy:reviewer-readonly"
  - ref_field: tool_policy_refs
    retired_ref: tool-policy:support-readonly
    expected_message: "retired tool policy ref tool-policy:support-readonly: retired outright with no replacement (never bound by any Agent Object)"
  - ref_field: hook_refs
    retired_ref: hook:leader-no-code
    expected_message: "retired hook ref hook:leader-no-code: use hook:leader-write-need-gate"
agent_preferred_adapter_rejects:
