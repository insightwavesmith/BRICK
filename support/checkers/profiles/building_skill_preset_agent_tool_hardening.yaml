materialize_building_intent_case:
  - label: materialize-building-intent:builder-default-building-id
    document:
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:fast-fix
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
          - .claude/**
      not_proven:
        - checker fixture task source only
    expected:
      building_id: source-template-fast-fix
      chain_preset_ref: building-chain-preset:fast-fix
      selected_adapter_ref: adapter:codex-local
      task_source_ref: brick/templates/tasks/source-template.md
      plan_shape: graph
      step_refs:
        - source-template-fast-fix-work
        - source-template-fast-fix-code-attack-qa
        - source-template-fast-fix-closure
      target_refs:
        - brick-source-template-fast-fix-code-attack-qa
        - brick-source-template-fast-fix-closure
        - building-boundary:source-template-fast-fix-closed
      node_reroute_budgets:
        brick-source-template-fast-fix-work: 5
      assert_route_policy_provenance: true
      route_policy_provenance:
        source-template-fast-fix-work:
          node_reroute_budget: preset-default
      task_source_hash_present: true
      declaration_evidence:
        work_files:
          - work/task.md
          - work/building-intake.json
          - work/preset-expansion.json
          - work/declared-building-plan.json
          - work/link-launch-policy.json
        task_source_hash_present: true
        task_source_hash_state: matched
  - label: materialize-building-intent:portfolio-sequence-graph
    document:
      plan_ref: building-plan:materialize-portfolio-sequence-graph
      building_id: materialize-portfolio-sequence-graph
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:portfolio-sequence
      selected_adapter_ref: adapter:local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
      not_proven:
        - checker fixture task source only
    expected:
      plan_shape: graph
      building_id: materialize-portfolio-sequence-graph
      chain_preset_ref: building-chain-preset:portfolio-sequence
      selected_adapter_ref: adapter:local
      task_source_ref: brick/templates/tasks/source-template.md
      step_refs:
        - materialize-portfolio-sequence-graph-plan
        - materialize-portfolio-sequence-graph-closure
      target_refs:
        - brick-materialize-portfolio-sequence-graph-closure
        - building-boundary:materialize-portfolio-sequence-graph-closed
  # GATE-WIRING FIRE (a) (0610): governed-change-review declares
  # gate_concept_profile [strict-evidence, coo-review, human-review]. The
  # materializer must TRANSLATE the declared label into REAL wired gates with
  # exact placement: strict on the QA-row transitions, coo + human on the FINAL
  # transition row only (target = closure boundary), the canonical human hold
  # policy on that same row only, and NOTHING extra anywhere else ADDED BY THIS
  # TRANSLATION (scope, codex review 0610: "nothing extra" covers what the
  # token translation stamps; a pre-existing AUTHOR-declared gate_sequence_policy
  # in a preset, e.g. brick-protocol-engine-feature-hard's design->work coo
  # HOLD, is untouched and still holds on its own row). The per-row
  # assertions pin both presence and absence, so this REDs if the label goes
  # decorative again OR if support starts stamping gates on undeclared rows.
  - label: materialize-building-intent:governed-change-review-gate-wiring
    # C4 (0615): governed-change-review's QA bricks declare a write NEED, so the
    # materialized intent carries a broad work-area write_scope and an
    # observed-write adapter (adapter:codex-local). adapter:local (read-only
    # in-process stub) may not materialize a write-needing QA plan.
    document:
      plan_ref: building-plan:materialize-governed-gate-wiring
      building_id: materialize-governed-gate-wiring
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:governed-change-review
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - "**"
        forbidden_paths:
          - ".git/**"
      not_proven:
        - checker fixture task source only
    expected:
      building_id: materialize-governed-gate-wiring
      chain_preset_ref: building-chain-preset:governed-change-review
      selected_adapter_ref: adapter:codex-local
      task_source_ref: brick/templates/tasks/source-template.md
      plan_shape: graph
      step_refs:
        - materialize-governed-gate-wiring-design
        - materialize-governed-gate-wiring-axis-attack-qa
        - materialize-governed-gate-wiring-code-attack-qa
        - materialize-governed-gate-wiring-closure
      target_refs:
        - brick-materialize-governed-gate-wiring-axis-attack-qa
        - brick-materialize-governed-gate-wiring-code-attack-qa
        - brick-materialize-governed-gate-wiring-closure
        - building-boundary:materialize-governed-gate-wiring-closed
      node_reroute_budgets:
        brick-materialize-governed-gate-wiring-design: 5
      assert_route_policy_provenance: true
      route_policy_provenance:
        materialize-governed-gate-wiring-design:
          node_reroute_budget: preset-default
      declared_gate_refs_by_row:
        - link-gate:default-transition
        - "link-gate:default-transition, link-gate:strict"
        - "link-gate:default-transition, link-gate:strict"
        - "link-gate:default-transition, link-gate:coo, link-gate:human"
      gate_sequence_policy_gate_refs_by_row:
        - ""
        - ""
        - ""
        - link-gate:human
      # GATE-WIRING FIRE A1/A4 (0610): every TRANSLATED row records
      # machine-readable provenance (which declared tokens landed there + which
      # preset declared them); the un-translated design row records NONE.
      gate_concept_provenance_by_row:
        - ""
        - strict-evidence
        - strict-evidence
        - "coo-review, human-review"
      gate_concept_provenance_declared_by: building-chain-preset:governed-change-review
      task_source_hash_present: true
  - label: materialize-building-intent:design-build-parallel-graph
    document:
      plan_ref: building-plan:materialize-design-build-parallel-graph
      building_id: materialize-design-build-parallel-graph
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:design-build-parallel
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
          - .claude/**
      not_proven:
        - checker fixture task source only
    expected:
      building_id: materialize-design-build-parallel-graph
      chain_preset_ref: building-chain-preset:design-build-parallel
      selected_adapter_ref: adapter:codex-local
      task_source_ref: brick/templates/tasks/source-template.md
      plan_shape: graph
      step_refs:
        - materialize-design-build-parallel-graph-design
        - materialize-design-build-parallel-graph-work
        - materialize-design-build-parallel-graph-code-attack-qa
        - materialize-design-build-parallel-graph-axis-attack-qa
        - materialize-design-build-parallel-graph-closure
      target_refs:
        - brick-materialize-design-build-parallel-graph-work
        - brick-materialize-design-build-parallel-graph-code-attack-qa
        - brick-materialize-design-build-parallel-graph-axis-attack-qa
        - brick-materialize-design-build-parallel-graph-closure
        - brick-materialize-design-build-parallel-graph-closure
        - building-boundary:materialize-design-build-parallel-graph-closed
      movements:
        - forward
        - forward
        - forward
        - forward
        - forward
        - forward
      group_roles:
        - fan_out
        - fan_in
      task_source_hash_present: true
      # Phase 2.5 false-green guard: assert the materialized node return shapes
      # themselves (not just step/target/movement refs). Verifies (1) no node
      # carries the support-invented concern_observations, (2) each fan-in SOURCE
      # shape == its full brick return.yaml shape
      # (brick-derived, not hardcoded or support-shrunk), (3) Link carry is
      # filtered by carries_forward_fields, and (4) the fan-in TARGET closure
      # shape contains transition_concern_evidence. Expectation is read from
      # the LIVE brick return.yaml so it tracks the source of truth.
      assert_materialized_return_shapes: true
      # Mechanism-vs-policy provenance guard (Smith-ruled): the reroute BUDGET and
      # closure routing POLICY are HUMAN Movement decisions; support records but
      # NEVER synthesizes them. This case uses NO per-Building override, so every
      # carried value's provenance MUST be preset-default (the reusable HUMAN-
      # authored preset default), and NONE may be support-synthesized/absent. The
      # exact per-node map below is asserted (case c: preset default).
      assert_route_policy_provenance: true
      route_policy_provenance:
        materialize-design-build-parallel-graph-design:
          node_reroute_budget: preset-default
        materialize-design-build-parallel-graph-work:
          node_reroute_budget: preset-default
        materialize-design-build-parallel-graph-closure:
          closure_transition_target_policy: preset-default
      declaration_evidence:
        work_files:
          - work/task.md
          - work/building-intake.json
          - work/preset-expansion.json
          - work/declared-building-plan.json
          - work/link-launch-policy.json
        task_source_hash_present: true
        task_source_hash_state: matched
  - label: materialize-building-intent:design-build-parallel-graph-per-building-override
    document:
      plan_ref: building-plan:materialize-design-build-parallel-graph-override
      building_id: materialize-design-build-parallel-graph-override
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:design-build-parallel
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
          - .claude/**
      # Per-Building OVERRIDE (config cascade): a HUMAN replaces the closure routing
      # policy for THIS Building only (whole-policy replacement; the policy is one
      # mapping on the closure node). The override beats the preset default and is
      # stamped provenance per-building; the untouched per-node reroute budgets stay
      # preset-default. Support synthesizes neither.
      #
      # (The reroute-budget per-Building override path is keyed by step_template_ref,
      # whose colon the checker's YAML-subset parser cannot represent as a mapping
      # key; that path is proven by the IMPLEMENTATION's own execution. This checker
      # case drives the per-building provenance through the colon-free closure-policy
      # override, which the subset parser represents faithfully.)
      closure_transition_target_policy:
        implementation_gap:
          action: target
          target_step_template_ref: building-step-template:design
        verification_gap:
          action: hold
      not_proven:
        - checker fixture task source only
    expected:
      building_id: materialize-design-build-parallel-graph-override
      chain_preset_ref: building-chain-preset:design-build-parallel
      plan_shape: graph
      task_source_hash_present: true
      # The untouched per-node budgets stay preset-default; the OVERRIDDEN closure
      # policy is stamped per-building. node_reroute_budgets is keyed by
      # brick_instance_ref.
      node_reroute_budgets:
        brick-materialize-design-build-parallel-graph-override-design: 1
        brick-materialize-design-build-parallel-graph-override-work: 1
      assert_route_policy_provenance: true
      route_policy_provenance:
        materialize-design-build-parallel-graph-override-design:
          node_reroute_budget: preset-default
        materialize-design-build-parallel-graph-override-work:
          node_reroute_budget: preset-default
        materialize-design-build-parallel-graph-override-closure:
          closure_transition_target_policy: per-building
  - label: materialize-building-intent:design-build-parallel-graph-constitutional-default
    strip_preset_ref: building-chain-preset:design-build-parallel
    strip_preset_keys:
      - node_reroute_budgets
    document:
      plan_ref: building-plan:materialize-design-build-parallel-graph-constitutional-default
      building_id: materialize-design-build-parallel-graph-constitutional-default
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:design-build-parallel
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
