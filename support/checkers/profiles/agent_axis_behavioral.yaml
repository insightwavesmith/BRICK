hook_registry_axis_case:
  - label: judging-kind-rejected
    expected_reason: hook_kind_not_advisory_or_guardrail
    hook_definition:
      owner_axis: Agent
      kind: sufficiency-gate
      event_ref: before-agent-return
      description: decides whether the work is good enough
      execution_opened: false
  - label: link-owned-hook-rejected
    expected_reason: hook_owner_axis_must_be_agent
    hook_definition:
      owner_axis: Link
      kind: advisory
      event_ref: before-agent-return
      description: hook claims Link ownership
      execution_opened: false
  - label: execution-opened-rejected
    expected_reason: hook_execution_must_remain_closed
    hook_definition:
      owner_axis: Agent
      kind: guardrail-intent
      event_ref: before-tool-use
      description: tries to run natively
      execution_opened: true
  - label: judgment-field-rejected
    expected_reason: hook_carries_forbidden_field
    hook_definition:
      owner_axis: Agent
      kind: advisory
      event_ref: before-agent-return
      description: smuggles a verdict field
      execution_opened: false
      sufficiency_verdict: good
