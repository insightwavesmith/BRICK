schema: checker-profile/v1
profile_id: agent-axis-behavioral
description: Consolidated agent-axis behavioral profile (PASS-2 fold of adapter_capability_rehome, agent_projection_sync, write_scope_default_exclude, preset_three_axis_contract_repair).
kernel_checks:
  - package_path_admission
  - axis_contract_projection
  - building_lifecycle_path_shape
  - building_map_graph
  - provider_preflight
  # GEMINI-INSPECT-READTIER-0617: executes Agent Adapter return/read-tier probes,
  # including gemini-local read-write-scoped -> read-only browse and redacted
  # non-zero stderr/stdout-error preservation. Mutation-RED: disable the
  # gemini-local read-write-scoped branch in agent_request_read_tier -> RED.
  - agent_adapter_return_shape
  # CR.P1.GEMINI_LOCAL_ONLY: adapter:gemini-local is the only active Gemini
  # customer adapter. It remains a local Gemini CLI subprocess using
  # GEMINI_API_KEY / GOOGLE_API_KEY auth; adapter:gemini-api is explicitly not
  # admitted, not capability-bearing, not model-selectable, and not effective
  # write-capable.
  - gemini_local_only_adapter
  # DESIGN-AI-TEXT-SEAM-0616: Claude/Codex prompt -> raw text seams. Executes
  # IN-PROCESS with mock command_runners only: normal raw text, missing
  # executable, timeout propagation, blank-output rejection, and secret-output
  # rejection. NO live provider CLI is called.
  - design_ai_text_seams
  # CONNECT-STALL CLASSIFICATION (TrackB 0619): pins the codex DEAD-worker label
  # split IN-PROCESS (no live CLI, no 20-min wait). Default stall threshold sits in
  # the 90-180s fast-fail band (env override + NaN/neg/zero guards intact); a
  # dead-connection signature fast-fails WITHIN the threshold and maps to the
  # distinct local_cli_connect_stall kind while a plain timeout stays
  # local_cli_timeout; both route to the SAME adapter_error_frontier HOLD with NO
  # auto-retry/scheduler; the reap journal carries the last health triple +
  # dead_signature_seconds as support facts only. Also pins fixture-only
  # content_policy classification from 451 / content-policy stderr or Codex JSONL
  # error/turn.failed stdout, with provider error text preserved ahead of noisy
  # stderr. Mutation-RED: re-flatten _adapter_error_kind (stall ->
  # local_cli_timeout), restore the ~20-min default threshold, or remove the
  # content-policy detector -> RED.
  - codex_connect_stall_classification
  # TREASURE PORT 2 (0611, lifted from 2d44fc7): no provider/runtime session id
  # in kernel/buildings/reviews/archive surfaces; 6 frozen-history legacy leak
  # files ride an explicit per-path allowlist of frozen line-content hashes
  # (codex-review tightening C: every offending line must hash-match a frozen
  # legacy line, so a same-count swap/replacement REDs; operator policy 0611:
  # frozen evidence/history is not rewritten); any NEW leak REDs.
  - agent_session_id_redaction
  # CASTING-NODE-CARRY (E/S1 follow-on, Smith B-policy strengthen-not-delete):
  # REAL behavioral probe that replaced the brittle plan_graph.py text_contains
  # selected_model_ref grep shape-pin (invalidated when S1 folded the per-field
  # casting carry into the opaque bag). Drives the genuine
  # plan_graph._linear_plan_from_graph_plan over a composed graph plan and asserts
  # the projected linear step carries every primitives.NODE_CASTING_FIELDS member
  # with step-OR-plan precedence (step truthy wins / plan fallback / None on
  # neither); iterating the real field table auto-covers future casting fields.
  # Mutation-RED: drop a field in primitives.stamp_casting (or merge_casting_bags)
  # -> the step-wins scenario sees that field return None instead of the declared
  # step value -> RED.
  - casting_node_carry
