text_contains:
  - path: AGENTS.md
    texts:
      - Support is not a fourth axis.
      - Runtime, engine, storage, wiki, docs, tests, checkers, memory, tools, Claude,
      - support/operator/run.py
      - brick_protocol.support.operator.run
      - "Agent transition concerns use the closed `concern_kind` vocabulary"
      - "upstream_gap"
      - "boundary_mismatch"
      - "insufficient_input"
      - "replay_needed"
      - "unknown"
      - "design_gap"
      - "implementation_gap"
      - "verification_gap"
      - "callable_performer_refs"
      - "transition_lifecycle:"
      - "progress_state: in_progress"
      - "required_disposition_owner: caller | coo | caller-or-coo"
      - "disposition_action: raise | forward | stop | reroute"
      - "budget_increment: <finite positive integer, required only for raise>"
      - "`human:/coo:/caller:` are author prefixes, not owner values"
      - "Human gate MUST-HALT conditions:"
      - "child Building candidate"
      - "support/operator/child_building_generation.py"
      - "AUTO-REPAIR-REPLAY-0"
      - "support/operator/auto_repair_replay.py"
      - "repair/replay Building Plan"
      - "credential / secret exposure risk"
      - "Impact tiers:"
      - "High-impact work requires explicit"
  - path: support/checkers/check_profile.py
    texts:
      - KERNEL_CHECK_IDS
      - source truth
text_absent:
  - path: support/checkers/check_profile.py
    texts:
      - subprocess
      - os.system
      - eval(
      - exec(
yaml_literal_set:
  - path: link/movement.yaml
    key: movement_literals[].movement
    values:
      - forward
      - reroute
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - checker profile pass as source truth
  - complete checker compaction
