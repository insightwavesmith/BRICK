# CLEAN-YARD v3 (Smith 0611): the standing dogfood evidence this profile used
# to pin (design-toolkit-and-mcp-0-0526 / project-orchestration-ledger-0-0528
# building roots, status/project-orchestration-ledger.json export, the 0528
# audit-era step outputs) left for the frozen museum. The SAME properties are
# now EXECUTED here: this case creates a temp vessel with the S2 verb, drives
# the REAL intake (stubbed write-capable adapter) to a complete building INSIDE
# it, asserts the retired pin property tables (building-map shape, declaration
# chain + task placement, preset-expansion declared values, step-output
# envelopes, orchestration-ledger packet/row shape incl. generated_at +
# last_evidence_at + link_disposition + 'not process liveness proof', rendered
# ledger view, PROGRESS render over the EMPTY vessel (0 buildings) and the
# 1-building vessel, effective-write step-output shape incl.
# worktree_observation), and removes the vessel in finally.
intake_evidence_projection_case:
  - label: clean-yard-read-side-projection
    vessel_id: checker-projection-fixture-vessel
    chain_preset_ref: building-chain-preset:brick-protocol-engine-feature-hard
    # Retired p9-dogfood preset-expansion pins (structure_template_integrity):
    # the same declared values must appear on a FRESH engine-feature-hard
    # expansion. (The 4th retired needle -- the archived 0526 review sheet
    # path -- is frozen-history content the CURRENT catalog no longer expands;
    # physicality of expanded refs is enforced by
    # check_brick_template_catalog_restructure.)
    expected_preset_expansion:
      chain_preset_catalog_source: dogfood_chain_presets
      canonical_chain_preset_ref: building-chain-preset:brick-protocol-engine-feature-hard
      common_basis_ref: building-chain-preset:high-risk-change-inspected
building_plan_boundary:
  # CLEAN-YARD v3: the retired-adapter LENIENT leg (allow_retired) re-pointed
  # from the departed dogfood plan project-orchestration-ledger-0.yaml to the
  # standing fixture (⚠ §1-2 third prescription).
  - path: brick/building_plans/fixture-retired-adapter-plan-0.yaml
    allow_retired_write_adapter_refs: true
proof_limits:
  - support evidence only
  - read-side view backstop checks renderer SHAPE and boundary text, not semantic correctness
  - the rendered view is a static projection over already-written evidence, not a runtime
  - not source truth
  - not source-truth write-back / edit surface
  - not a dashboard runtime / server / scheduler
  - not a provider-liveness proof
  - generated_at and rows[].last_evidence_at are recency/observation fields (snapshot build time and newest recorded evidence timestamp), not process liveness
  - not success judgment
  - not quality judgment
  - not Movement authority
  - profile pass is not source truth
  - local inbox projection only
  - not route input
not_proven:
  - semantic correctness of the projected Building states
  - whether a provider process is currently alive
  - dashboard UI readiness
  - future provider or subagent behavior
  - MCP client behavior
  - semantic fitness of future selected shapes
  - automatic Building Plan authoring
  - cross-participant synchronization
  - semantic correctness of Building states
  - delivery reliability
  - stale evidence snapshot behavior
  - external notification behavior
  - reporter packet usefulness for every future Building type
  - future semantic correctness of Building outputs
  - future provider behavior
  - production runtime readiness
