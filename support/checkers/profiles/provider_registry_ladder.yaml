schema: checker-profile/v1
profile_id: provider-registry-ladder
description: Fixture-only provider registry persistence and adapter-resolution ladder guard.
kernel_checks:
  - provider_registry_ladder
path_exists:
  - support/operator/provider_registry.py
  - support/operator/plan_rendering.py
  - support/operator/onboard.py
  - support/checkers/check_provider_registry_ladder.py
  - support/checkers/profiles/provider_registry_ladder.yaml
text_contains:
  - path: support/checkers/check_provider_registry_ladder.py
    texts:
      - 'tempfile.TemporaryDirectory(prefix="bp-provider-registry-")'
      - 'os.environ["BRICK_HOME"] = tmp'
      - 'absent providers.yaml preserves legacy lane preference'
      - 'unregistered static preference falls back with model update'
      - 'BRICK_PROVIDER_LADDER=0 forces legacy behavior'
  - path: support/operator/provider_registry.py
    texts:
      - 'PROVIDERS_FILENAME = "providers.yaml"'
      - 'PROVIDER_LADDER_ENV = "BRICK_PROVIDER_LADDER"'
      - 'registry_path.chmod(0o600)'
      - 'register_ready_provider'
      - 'last_preflight'
text_absent:
  - path: support/checkers/check_provider_registry_ladder.py
    texts:
      - 'Path.home() / ".brick"'
      - 'provider_registry_path()'
proof_limits:
  - support evidence only
  - fixture-only provider registry checker
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
