schema: checker-profile/v1
profile_id: brick-cli-entrypoint
description: P1 customer-facing brick CLI entrypoint bootstrap profile.
kernel_checks:
  - brick_cli_entrypoint_smoke
  - first_use_wizard
path_exists:
  - pyproject.toml
  - support/operator/cli.py
  - support/operator/first_use.py
  - support/checkers/check_first_use_wizard.py
  - support/checkers/profiles/brick_cli_entrypoint.yaml
text_contains:
  - path: pyproject.toml
    texts:
      - '[project.scripts]'
      - 'brick = "brick_protocol.support.operator.cli:main"'
  - path: support/operator/cli.py
    texts:
      - '_REPO_ROOT = Path(__file__).resolve().parents[2]'
      - '_IMPORT_IDENTITY_ROOT = _REPO_ROOT / "support" / "import_identity"'
      - 'sys.path.insert(0, str(_REPO_ROOT))'
      - 'sys.path.insert(0, str(_IMPORT_IDENTITY_ROOT))'
      - 'from support.checkers import check_profile'
      - 'from support.operator.first_use import FIRST_USE_FILENAME, write_first_use'
      - 'run_customer_building_in_sandbox'
      - 'run_customer_graph_building_in_sandbox'
      - 'def _active_slack_buildings_root'
      - 'Path("/Users/smith/.brick/project/brick-protocol/buildings")'
      - 'def _load_graph_packet'
      - 'build_input_mode'
      - 'graph_packet'
      - 'DEFAULT_REAL_TASK_PRESET_REF = "building-chain-preset:fast-fix"'
      - 'REAL_PROVIDER_SELECTION_ORDER = ('
      - '_first_ready_real_provider_choice'
      - 'provider_readiness_observations'
      - 'derived_worktree_write_scope()'
      - 'adapter_is_write_capable(adapter)'
      - 'def _customer_visible_frontier_state'
      - 'customer_visible_frontier_state'
      - 'customer_visible_not_ready'
      - 'frontier_message:'
      - 'materialized_step_adapters'
      - 'init_parser.add_argument("--host", default="codex"'
      - 'onboard.run_doctor()'
      - 'check_profile.main(verify_argv)'
      - 'write_first_use('
      - 'next: read {FIRST_USE_FILENAME}'
      - 'build.add_argument('
      - '"--graph-packet"'
      - '"--graph"'
      - '"--large"'
      - '"--dev-lanes"'
      - 'P3_EASY_LARGE_MIN_DEV_LANES = 2'
      - 'P3_EASY_LARGE_MAX_DEV_LANES = 8'
      - 'def _p3_easy_large_graph_packet'
      - 'declare either graph packet mode or task/task-source mode, not both'
      - 'graph-packet-declared'
      - 'large-graph-declared'
  - path: support/operator/first_use.py
    texts:
      - 'FIRST_USE_FILENAME = "FIRST_USE.md"'
      - '이건 예제입니다 -- 실제 빌딩은 `brick auth login` 후 `--real-provider`.'
      - 'Agent adapter evidence'
      - 'This was a local example stub.'
      - '`brick auth login`'
      - '`--real-provider`'
      - 'first ready provider-backed '
      - 'observed-write adapter'
      - 'falls back to `adapter:local`'
      - 'not source truth'
  - path: support/checkers/check_first_use_wizard.py
    texts:
      - 'EXPECTED_DISCLAIMER = "이건 예제입니다 -- 실제 빌딩은 `brick auth login` 후 `--real-provider`."'
      - 'first_use_wizard'
      - 'removing the example-stub disclaimer did not drive RED'
text_absent:
  - path: support/operator/cli.py
    texts:
      - os.system
      - eval(
      - exec(
      - choose_movement
      - success_judgment
      - quality_judgment
      - adapter:gemini-api
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - real provider behavior
  - customer PATH shell behavior beyond the observed entrypoint launch
  - future Building correctness
