schema: checker-profile/v1
profile_id: bounded-agent-proposed-routing-loop
description: BOUNDED-AGENT-PROPOSED-ROUTING-LOOP-0 enforcement over the admitted dynamic graph walker surface, walker_mode entry, the standalone walker-invariant checker, and the locked loop invariants.
kernel_checks:
  - package_path_admission
  # Executes the standalone walker checker live inside check_profile --all:
  # imports + walks the real dynamic graph walker over adapter:local fixtures
  # (adopt within budget / HOLD on exhaustion = termination / shared target
  # budget). A broken walker invariant now makes --all EXIT non-zero.
  - bounded_agent_proposed_routing_loop
  # Executes the standalone ζ6 recording-contract checker live inside --all:
  # contract-derived evidence shape + INDEPENDENT axis-value drift catch.
  - recording_checker_derived_contract
path_exists:
  - support/operator/dynamic_walker.py
  - support/operator/run.py
  - support/connection/agent_adapter.py
  - support/checkers/check_bounded_agent_proposed_routing_loop0.py
  - AGENTS.md
text_contains:
  - path: AGENTS.md
    texts:
      - BOUNDED-AGENT-PROPOSED-ROUTING-LOOP-0
      - support/operator/dynamic_walker.py
      - BUILDING-OPERATOR-DRIVER-0
  - path: support/operator/run.py
    texts:
      - walker_mode
      - _run_dynamic_graph_walker
  # ELEGANT-REFACTOR P3c: the dynamic walker god-module was decomposed into the
  # thin facade (support/operator/dynamic_walker.py) + single-concern operator
  # collaborators (support/operator/walker_*.py). The boundary-statement pins that
  # describe the WALK INVARIANT live in the facade docstring; the pins tied to a
  # MOVED function body follow the behavior-identical rehome to the collaborator
  # that now homes that body (checker-pin-follows-rehome standard).
  - path: support/operator/dynamic_walker.py
    texts:
      # budget consumed per reroute-landing, not per forward-replay-execution
      - REROUTE-LANDING, not per forward-replay-execution
      # HOLD on exhaustion with caller-or-coo disposition
      - transition_lifecycle.state=paused
      - required_disposition_owner=caller-or-coo
      # repeated non-self landings draw the same shared budget (no fresh budget)
      - it never receives a fresh budget
      # support halts and records; the human decides raise/forward/stop
      - does NOT decide raise/forward/stop
      # zeta7: agent proposes (binding:false), gate adopts, support authors nothing
      - binding:false
      - support authors no route or Movement
  # the forward step-walk kernel (P3c rehome)
  - path: support/operator/walker_kernel.py
    texts:
      - def _run_dynamic_graph_walker
      - transition_concern_adoption
      - advisory
      - ThreadPoolExecutor
  - path: support/operator/walker_frontier_driver.py
    texts:
      - BRICK_FANOUT_DISPATCH_POOL_SIZE
      - ready_items
  # per-TARGET-node, Link-assigned budget, shared across landings (P3c rehome)
  - path: support/operator/walker_reroute_budget.py
    texts:
      - def _node_reroute_budgets
      - keyed by the TARGET Brick node ref and is SHARED
      # target must resolve to an existing node (support never invents one)
      - must resolve to an existing node
      - in declared_bricks
      # required + positive budget (no absent / zero / fresh-per-event budget)
      - must be a positive integer
      # P4 Carry budget evidence refs are exposed without giving support authority.
      - carry_budget_evidence_ref
      - evidence/claim_trace/link/carry_trace.json
  # HOLD construction records budget exhaustion (P3c rehome)
  - path: support/operator/walker_hold.py
    texts:
      - budget_exhausted
  # Agent non-binding concern adoption; AgentFact stays closed (P3c rehome)
  - path: support/operator/walker_transition_concern.py
    texts:
      # AgentFact stays closed; concern nested in the closed returned shape
      - AgentFact stays closed
      # malformed Agent concern pauses instead of writer-crashing or adopting Movement
      - invalid_transition_concern_evidence
      # null/false/empty-string/absent are no-concern; {} is a malformed present mapping
      - 'concern in (None, False, "")'
  # adapter interruption before AgentFact writes an agent_incomplete frontier (P3c rehome)
  - path: support/operator/walker_frontier.py
    texts:
      - write_adapter_error_frontier
      - dynamic adapter exception frontier evidence written
  # ELEGANT-REFACTOR P3b: the Link transition-lifecycle carry-budget evidence
  # field moved into the Link per-crossing-family emitter, and the node-reroute /
  # route-replay Carry-budget observation facts moved into the Carry-budget
  # emitter; the location pins follow the behavior-identical rehome
  # (checker-pin-follows-rehome standard).
  - path: support/recording/claims_link.py
    texts:
      - transition_lifecycle_carry_budget_evidence_ref
  - path: support/recording/claims_carry_budget.py
    texts:
      - observed_total_execution_count_by_boundary
      - observed_replay_execution_count_by_boundary
  - path: support/checkers/check_bounded_agent_proposed_routing_loop0.py
    texts:
      - per-TARGET-Brick
      - HOLDs
      - support never invents one
      - b4-g7
      - invalid-concern
      - adapter-frontier
      - forward disposition emitted unresolved public fact refs
      - check_building_lifecycle_path_shape
      - transition_lifecycle_carry_budget_evidence_ref
      - route_replay_plan.max_attempts was not recorded as Carry budget evidence
      - all-placeholder carry_trace was not rejected
      # MAIL-REPAIR (0611): the executed runtime-mail case family stays wired.
      - "mail-1: runtime reason_ref marker did NOT arrive"
      - "mail-2: a broken-address reroute was ADOPTED"
      - "mail-3: declared-only mailbox"
      - "mail-4: the resume disposition row's mail"
      # FIX 1/2/3 (0611): the codex-found blocker pins stay wired -- path
      # traversal containment (mail-5), THIS-resume-only disposition
      # eligibility (mail-6), and row-specific replay provenance (mail-4/6).
      - "mail-5a: a ..-escaping ledger address was ADOPTED"
      - "mail-5b: an absolute-path address was ADOPTED"
      - "mail-5c: an in-subtree resolving ledger address blocked adoption"
      - "mail-6: a resume with only STALE same-target rows did not fail"
      - replaying the recorded selection rule
      - "b1-advisory-empty: advisory empty-ref concern produced reroute/HOLD records"
      - "b1-advisory-red-empty: removing advisory did not restore HOLD behavior"
      - "declared-gate-refs: explicit link-gate:default-transition was rejected"
      - "declared-gate-refs: active post-expansion Link row missing"
      - "knot4-self-reroute: self-target concern produced reroute/HOLD records"
      - "knot4-strip-self-single: source+sibling did not adopt exactly one"
      - "knot4-strip-self-ambiguous: source+two-siblings adopted a target"
      - "knot4-strip-self-kind-agnostic: source kind"
      - "knot4-other-target-control: expected one adopted true reroute"
      - "invalid-concern: malformed concern copied proposed target into HOLD target fields"
      - "qa-verification-gap-brick-target: validator accepted a verification_gap"
      - "qa-verification-gap-sentinel: non-reroute verification_gap produced"
      - "p6c-byte-fanout: normalized evidence-manifest/spine/building-map"
      - "p6c-byte-fanout-red: timed fixture failed to invert wall-clock"
      - "p6c-shared-fanin-reroute: normalized evidence-manifest/spine/"
      - "route-policy-yaml-absent-red: absent preset budgets did not"
      - "route-policy-fields-red: missing route-policy provenance"
      - "b5-c3-reentry-step-evidence: missing redo step-output"
      - "b5-c3-reentry-step-evidence-red: replay step executed more"
  # MAIL-REPAIR (0611): the engine-side mail lane stays wired -- the kernel
  # carries runtime_handoffs on adopted-reroute redo items, reads the recorded
  # row back from the ledger, and HOLDs loudly on a broken ledger address.
  # FIX 1 (0611): step-output-form addresses are CONTAINED to this Building's
  # work/step-outputs subtree, not merely existence-probed.
  - path: support/operator/walker_kernel.py
    texts:
      - runtime_handoffs
  - path: support/operator/walker_runtime_mail.py
    texts:
      - _runtime_concern_handoff_from_ledger
      - runtime_handoff_address_unresolved_in_ledger
      - _step_output_address_escapes_ledger
  # FIX 2/3 (0611): the resume reader scopes the disposition row to THE
  # CURRENT hold and records the selected row's replay discriminator.
  - path: support/operator/walker_resume.py
    texts:
      - disposition_reason_refs
      - disposition_row_same_hold_index
  - path: agent/receipt.py
    texts:
      - received_handoff_refs
  - path: support/checkers/check_building_lifecycle_path_shape.py
    texts:
      - transition_lifecycle_reason_refs
  - path: support/connection/agent_adapter.py
    texts:
      - def _transition_concern_schema_rules
      - 'never return an empty object {}'
      - transition_concern_evidence.binding must be the JSON literal false
      - candidate_pending_target_ref
      - secondary_concern_kind
  - path: brick/templates/bricks/closure/brick.md
    texts:
      - 'transition_concern_evidence: null'
      - 'never return `{}`'
text_absent:
  # zeta7 source guard: the walker must not author a support: route author_ref or
  # invent a movement choice; AgentFact must not expand. P3c: the guard now also
  # covers the walk kernel + resume collaborators that home the routing logic.
  - path: support/operator/dynamic_walker.py
    texts:
      - 'author_ref = "support:'
      - "author_ref = 'support:"
      - choose_movement
      - support_chosen_movement
  - path: support/operator/walker_kernel.py
    texts:
      - 'author_ref = "support:'
      - "author_ref = 'support:"
      - choose_movement
      - support_chosen_movement
  - path: support/operator/walker_resume.py
    texts:
      - 'author_ref = "support:'
      - "author_ref = 'support:"
      - choose_movement
      - support_chosen_movement
  - path: support/checkers/check_bounded_agent_proposed_routing_loop0.py
    texts:
      - subprocess
      - os.system
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - real provider parallel execution
  - semantic correctness of the agent-proposed reroute
  - caller/COO disposition after a HOLD
  - checker profile pass as source truth
