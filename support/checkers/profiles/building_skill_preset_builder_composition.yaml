  # GATE-WIRING FIRE (a) (0610): governed-change-review declares
  # gate_concept_profile [strict-evidence, coo-review, human-review]. The
  # materializer must TRANSLATE the declared label into REAL wired gates with
  # exact placement: strict on the QA-row transitions, coo + human on the FINAL
  # transition row only (target = closure boundary), the canonical human hold
  # policy on that same row only, and NOTHING extra anywhere else ADDED BY THIS
  # TRANSLATION (scope, codex review 0610: "nothing extra" covers what the
  # token translation stamps; a pre-existing AUTHOR-declared gate_sequence_policy
  # in a preset, e.g. brick-protocol-engine-feature-hard's design->work coo
  # HOLD, is untouched and still holds on its own row). The per-row
  # assertions pin both presence and absence, so this REDs if the label goes
  # decorative again OR if support starts stamping gates on undeclared rows.
  - label: materialize-building-intent:governed-change-review-gate-wiring
    # C4 (0615): governed-change-review's QA bricks declare a write NEED, so the
    # materialized intent carries a broad work-area write_scope and an
    # observed-write adapter (adapter:codex-local). adapter:local (read-only
    # in-process stub) may not materialize a write-needing QA plan.
    document:
      plan_ref: building-plan:materialize-governed-gate-wiring
      building_id: materialize-governed-gate-wiring
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:governed-change-review
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - "**"
        forbidden_paths:
          - ".git/**"
      not_proven:
        - checker fixture task source only
    expected:
      building_id: materialize-governed-gate-wiring
      chain_preset_ref: building-chain-preset:governed-change-review
      selected_adapter_ref: adapter:codex-local
      task_source_ref: brick/templates/tasks/source-template.md
      plan_shape: graph
      step_refs:
        - materialize-governed-gate-wiring-design
        - materialize-governed-gate-wiring-axis-attack-qa
        - materialize-governed-gate-wiring-code-attack-qa
        - materialize-governed-gate-wiring-closure
      target_refs:
        - brick-materialize-governed-gate-wiring-axis-attack-qa
        - brick-materialize-governed-gate-wiring-code-attack-qa
        - brick-materialize-governed-gate-wiring-closure
        - building-boundary:materialize-governed-gate-wiring-closed
      node_reroute_budgets:
        brick-materialize-governed-gate-wiring-design: 5
      assert_route_policy_provenance: true
      route_policy_provenance:
        materialize-governed-gate-wiring-design:
          node_reroute_budget: preset-default
      declared_gate_refs_by_row:
        - link-gate:default-transition
        - "link-gate:default-transition, link-gate:strict"
        - "link-gate:default-transition, link-gate:strict"
        - "link-gate:default-transition, link-gate:coo, link-gate:human"
      gate_sequence_policy_gate_refs_by_row:
        - ""
        - ""
        - ""
        - link-gate:human
      # GATE-WIRING FIRE A1/A4 (0610): every TRANSLATED row records
      # machine-readable provenance (which declared tokens landed there + which
      # preset declared them); the un-translated design row records NONE.
      gate_concept_provenance_by_row:
        - ""
        - strict-evidence
        - strict-evidence
        - "coo-review, human-review"
      gate_concept_provenance_declared_by: building-chain-preset:governed-change-review
      task_source_hash_present: true
