        - link-gate:default-transition
        - link-gate:default-transition
        - link-gate:default-transition
        - link-gate:default-transition
        - link-gate:default-transition
      gate_concept_provenance_by_row:
        - ""
        - ""
        - ""
        - ""
        - ""
      task_source_hash_present: true
materialize_building_intent_rejects:
  - label: materialize-building-intent:missing-task-source-ref
    expected_message: task_source_ref must not be blank
    document:
      plan_ref: building-plan:materialize-missing-task
      building_id: materialize-missing-task
      declared_by: coo
      chain_preset_ref: building-chain-preset:fast-fix
      selected_adapter_ref: adapter:codex-local
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
  - label: materialize-building-intent:missing-chain-preset-ref
    expected_message: chain_preset_ref must not be blank
    document:
      plan_ref: building-plan:materialize-missing-preset
      building_id: materialize-missing-preset
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      selected_adapter_ref: adapter:codex-local
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
  - label: materialize-building-intent:omitted-adapter-fails-closed-linear
    expected_message: selected_adapter_ref must be declared in the confirmed intent
    document:
      plan_ref: building-plan:materialize-omitted-adapter-linear
      building_id: materialize-omitted-adapter-linear
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
