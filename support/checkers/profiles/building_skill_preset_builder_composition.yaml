compose_building_case:
  - label: builder-templated-work-statement-only
    document:
      selected_shape_ref: building-shape:reviewable-work
      declared_by: caller
      plan_ref: building-plan:builder-ws-only
      building_id: builder-ws-only
      nodes:
        - node_id: bwso-work
          step_template_ref: building-step-template:work
          work_statement: Implement the builder work-statement-only proof.
        - node_id: bwso-review
          step_template_ref: building-step-template:review
          work_statement: Review the builder proof.
        - node_id: bwso-closure
          step_template_ref: building-step-template:closure
          work_statement: Close the builder proof.
      edges:
        - edge_ref: edge:bwso-work-to-review
          source: bwso-work
          target: bwso-review
          movement: forward
        - edge_ref: edge:bwso-review-to-closure
          source: bwso-review
          target: bwso-closure
          movement: forward
          gate: human
        - edge_ref: edge:bwso-closure-to-boundary
          source: bwso-closure
          target: building-boundary:builder-ws-only-closed
          movement: forward
          building_lifecycle:
            state: closed
            reason: builder work-statement-only proof closed
    expected:
      plan_shape: graph
      selected_adapter_ref: adapter:local
      declared_gate_refs:
        - link-gate:default-transition
        - link-gate:human
      frontier_kind: complete
compose_building_rejects:
  - label: builder-templated-missing-work-statement
    expected_code: missing_brick_fields
    document:
      selected_shape_ref: building-shape:reviewable-work
      declared_by: caller
      plan_ref: building-plan:builder-ws-missing
      building_id: builder-ws-missing
      nodes:
        - node_id: bwsm-work
          step_template_ref: building-step-template:work
        - node_id: bwsm-review
          step_template_ref: building-step-template:review
          work_statement: Review.
        - node_id: bwsm-closure
          step_template_ref: building-step-template:closure
          work_statement: Close.
      edges:
        - edge_ref: edge:bwsm-work-to-review
          source: bwsm-work
          target: bwsm-review
          movement: forward
        - edge_ref: edge:bwsm-review-to-closure
          source: bwsm-review
          target: bwsm-closure
          movement: forward
          gate: human
        - edge_ref: edge:bwsm-closure-to-boundary
          source: bwsm-closure
          target: building-boundary:builder-ws-missing-closed
          movement: forward
          building_lifecycle:
            state: closed
            reason: builder missing work statement
  - label: c1-bad-gate-token
    expected_code: bad_gate_token
    document:
      selected_shape_ref: building-shape:simple-do
      declared_by: caller
      nodes:
        - node_id: bad-gate-work
          step_template_ref: building-step-template:work
          work_statement: Work.
          comparison_rule: Observe support evidence only.
          required_return_shape: observed_evidence, not_proven
      edges:
        - source: bad-gate-work
          target: building-boundary:bad-gate-closed
          movement: forward
          gate: robot
proof_limits:
  - support evidence only
  - staging copies only; original profile remains intact
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
not_proven:
  - complete builder profile diet
  - semantic fitness of future chain preset selection
