materialize_building_intent_case:
  - label: materialize-building-intent:fast-fix-sequential-graph
    document:
      plan_ref: building-plan:materialize-fast-fix-sequential-graph
      building_id: materialize-fast-fix-sequential-graph
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:fast-fix
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
          - .claude/**
      not_proven:
        - checker fixture task source only
    expected:
      building_id: materialize-fast-fix-sequential-graph
      chain_preset_ref: building-chain-preset:fast-fix
      selected_adapter_ref: adapter:codex-local
      task_source_ref: brick/templates/tasks/source-template.md
      plan_shape: graph
      step_refs:
        - materialize-fast-fix-sequential-graph-work
        - materialize-fast-fix-sequential-graph-code-attack-qa
        - materialize-fast-fix-sequential-graph-closure
      target_refs:
        - brick-materialize-fast-fix-sequential-graph-code-attack-qa
        - brick-materialize-fast-fix-sequential-graph-closure
        - building-boundary:materialize-fast-fix-sequential-graph-closed
      node_reroute_budgets:
        brick-materialize-fast-fix-sequential-graph-work: 5
      assert_route_policy_provenance: true
      route_policy_provenance:
        materialize-fast-fix-sequential-graph-work:
          node_reroute_budget: preset-default
      task_source_hash_present: true
  - label: materialize-building-intent:app-feature-basic-graph
    document:
      plan_ref: building-plan:materialize-app-feature-basic-graph
      building_id: materialize-app-feature-basic-graph
      declared_by: coo
      task_source_ref: brick/templates/tasks/source-template.md
      chain_preset_ref: building-chain-preset:app-feature-basic
      selected_adapter_ref: adapter:codex-local
      selected_model_ref: model:default
      write_scope:
        allowed_paths:
          - support/operator/**
        forbidden_paths:
          - .git/**
          - .claude/**
      not_proven:
        - checker fixture task source only
    expected:
      plan_shape: graph
      building_id: materialize-app-feature-basic-graph
      chain_preset_ref: building-chain-preset:app-feature-basic
      selected_adapter_ref: adapter:codex-local
