# G5 S1 (gap seal): the graph walker (walker_kernel) does NOT read
# building_lifecycle.state: waiting / transition_lifecycle.state: paused
# directly; it only HALTS on a gate_sequence_policy HOLD. A Link row that
# directly declares a stop state WITHOUT a HOLD-causing gate policy on the same
# row would be walked through by the graph model where the linear walker
# (run.py 1461/1469) breaks. _validate_building_lifecycle_for_link_row /
# _validate_transition_lifecycle_for_link_row MUST reject it. These probes
# exercise the validators directly (the case document is the link_row).
building_lifecycle_rejects:
  - label: waiting-without-hold-gate-policy
    expected_message: "building_lifecycle.state: waiting requires a gate_sequence_policy"
    document:
      link_row:
        movement: forward
        target_ref: building-boundary:waiting-gate
        building_lifecycle:
          state: waiting
  - label: waiting-with-reroute-only-gate-policy
    expected_message: "building_lifecycle.state: waiting requires a gate_sequence_policy"
    document:
      link_row:
        movement: forward
        target_ref: building-boundary:waiting-gate
        building_lifecycle:
          state: waiting
        gate_sequence_policy:
          - gate_ref: link-gate:default-transition
            on_missing_required_facts:
              action: reroute
              target_ref: building-boundary:elsewhere
  - label: paused-without-hold-gate-policy
    expected_message: "transition_lifecycle.state: paused requires a gate_sequence_policy"
    document:
      link_row:
        movement: forward
        target_ref: building-boundary:paused-gate
        transition_lifecycle:
          state: paused
          progress_state: in_progress
