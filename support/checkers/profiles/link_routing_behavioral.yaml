proof_limits:
  - support evidence only
  - transition concern is non-binding Agent evidence
  - Link disposition is Link row evidence
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
  - Link-owned declared policy only
  - Link decision packet is an evidence view
  - declared boundary replay uses repeated step_refs
not_proven:
  - semantic correctness of transition concern
  - semantic correctness of Link disposition
  - production runtime readiness
  - semantic correctness of concern mapping
  - semantic honesty of Agent reports
  - route policy matching
  - route materialization
  - automatic repair/replay execution
  - automatic child Building generation
  - semantic correctness of QA route request
  - semantic correctness of Link decision
  - hidden runtime loop behavior
  - scheduler or queue behavior
