schema: checker-profile/v1
profile_id: building-operator-driver0
description: BUILDING-OPERATOR-DRIVER-0 enforcement over the admitted bounded declared multi-Building driver, adapter:local checker probes, and the MODE-2 no-bare-default-transition rule.
kernel_checks:
  - building_operator_driver0
  - onboard_smoke
path_exists:
  - support/operator/driver.py
  - support/checkers/check_building_operator_driver0.py
  - AGENTS.md
  # ONBOARDING-WIZARD-0 surface (pinned by the onboard_smoke kernel check).
  - support/operator/onboard.py
  - brick/building_plans/onboarding-example-0.yaml
text_contains:
  - path: AGENTS.md
    texts:
      - BUILDING-OPERATOR-DRIVER-0
  - path: support/operator/driver.py
    texts:
      - def run_declared_portfolio
      - run_building_plan(
      - multi_candidate_requires_declared_policy
      - proposed_candidate_not_in_declared_set
      - portfolio_transition_budget_exhausted
      - support authors no Building Plan, Movement, target, or adoption
      - disposition_action_surface
      # H2a direct-graph intake seam: compose_building (no preset) + reattach the
      # inline task-source carry + run_building_plan; the preset path is untouched.
      - def run_composed_graph_intake
      - inline_task_source_carry(
      - 'run_composed_graph_intake admits only plan_shape: graph'
      # Shared worktree-sandbox bracket the preset customer path routes through.
      - def _run_in_worktree_sandbox
      - run_dispatch=_run_preset
  - path: support/checkers/check_building_operator_driver0.py
    texts:
      - MODE2 bare-default rejected
      - candidate-not-in-declared-set rejected
      - child_roots=
      - adapter:local deterministic fixture only
      # H2a direct-graph intake FIRE pins (the seam + evidence-spine proof).
      - H2a direct-graph intake FIRE passed
      - def _h2a_direct_graph_intake_fire
      - h2a-mutation-RED
      - h2a-idempotency
  # ONBOARDING-WIZARD-0 PART-2: the example routes through the PART-1 seam, the
  # real-vs-local adapter is driven by preflight readiness evidence, and the
  # handoff names the seam verb. (onboard_seam_case executes these; the source
  # pins keep the routing/handoff honest even if the case stops covering them.)
  - path: support/operator/onboard.py
    texts:
      - from brick_protocol.support.operator.driver import run_building_intake
      - 'SEAM_VERB = "support.operator.driver.run_building_intake"'
      - result_obj = run_building_intake(
      - def _choose_example_adapter
      - def _preflight_readiness
      # c2 (0610): the adapter-write gate reads the CANONICAL observed-write set
      # (adapter_is_write_capable -- codex-local AND claude-local), not a codex
      # literal. Pins updated to the corrected fact.
      - adapter_is_write_capable(real_ref)
      - 'adapter_ref": real_ref'
      - preflight readiness=ready for observed-write adapter
      - '"routed_through": SEAM_VERB'
      - '"preflight_readiness": readiness'
      - allow_real_provider
text_absent:
  - path: support/operator/driver.py
    texts:
      - while True
      - subprocess
      - os.system
      - threading
      - choose_movement
      - support_chosen_movement
      - 'author_ref = "support:'
      - "author_ref = 'support:"
proof_limits:
  - support evidence only
  - not source truth
  - not success judgment
  - not quality judgment
  - not Movement authority
  - not real-provider proof
  - not concurrency proof
onboard_seam_case:
  - label: onboarding example routes through the PART-1 seam (preferred-step adapter fallback)
    host: codex
    bogus_host: definitely-not-a-host
    # provider-availability dependent (measured: 8 runs split agent_incomplete /
    # complete; this graph has NO human gate so link_paused cannot occur). A
    # no-provider machine honestly records agent_incomplete (non-local preferred
    # adapters can't run); a provider-equipped machine's design step completes ->
    # complete. Both honest; pinning one made this profile flaky on brick verify /
    # --all. The set is EXACTLY the two outcomes this gate-less graph can reach --
    # an unexpected link_paused/error/empty still REDs (it would be a real bug).
    acceptable_frontier_kinds: [agent_incomplete, complete]
step_output_drain_case:
  - label: driver0-live-linear-incoming-handoff-step-output-ref
    case_kind: live_linear_n1
    expected:
      consumer_brick_instance_ref: brick-linear-consumer
      source_fact_body_refs:
        - work/step-outputs/linear-producer-attempt-1/step-output.json
      carried_markers:
        - brick-linear-producer
      incoming_step_output_refs:
        - work/step-outputs/linear-producer-attempt-1/step-output.json
not_proven:
  - semantic correctness of Agent transition_concern_evidence
  - caller/COO disposition after a portfolio HOLD
  - real-provider multi-Building autonomy
  - checker profile pass as source truth
  - real-provider onboarding example completion (adapter:codex-local)
