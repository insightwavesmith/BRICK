# Module Registry (engine blueprint 0531 §4 Table B) — the cohesion ledger.
#
# Append-only. ONE row per support module on disk (minus package __init__.py and
# tests, which G4 excludes). The elegance guard reads this file + the file tree
# and rejects any support module not registered here (G4, bidirectional with the
# package-path mag-0 allowlist).
#
# Support record / governance projection only. Decides nothing: NOT source truth,
# NOT success judgment, NOT quality judgment, NOT Movement authority. Admits no
# axis or fact class.
#
# OWNERSHIP MODEL (so the guard is honest, not tautological):
#   owns_crossings      = the axis crossings whose SUPPORT-SIDE mechanics are
#                         solely homed in this module. Most support modules are
#                         consumers / validators / projectors / orchestrators /
#                         emitters and own ZERO axis crossings (they consume
#                         contracts; they do not home one). Owning <=1 is the
#                         elegant target (G2). Only two non-empty
#                         decomposition_target rows remain: check-profile-god-0
#                         (historical/self-consistency ceiling on the thin
#                         checker facade) and rs-sink-ceiling-0 (live report
#                         sink ceiling). G6 is support-governance
#                         self-consistency evidence, NOT success/quality/
#                         Movement authority and NOT the primary re-bloat
#                         ratchet; see the decomposition_ceilings proof-limit
#                         note below.
#   consumes_crossings  = crossings this module reaches via the canonical contract
#                         (real axis imports). Read-only coupling record.
#   imports_axis        = the axis source files this module imports from. G3
#                         AST-scans the real imports and rejects any symbol that
#                         is not a canonical_symbol of a crossing defined in that
#                         file (per crossing_registry.yaml).
#   forbidden_ownership = the authoring this support module must NEVER do
#                         (G5 re-encodes the support baseline independently).
#   decomposition_target= present only on rows with an admitted G6 ceiling:
#                         check-profile-god-0 preserves historical checker
#                         facade self-consistency, and rs-sink-ceiling-0 pins
#                         the live report sink dispatch ceiling. G6 observes
#                         ceiling self-consistency only; it does not judge
#                         quality/success or choose Movement.
#
# roles:
#   facade            delegates each crossing to its owner, authors nothing
#                     (historical god-module decompositions now leave thin
#                     support facades where admitted).
#   oracle            independent re-encoder (check_axis_contract_projection).
#   carrier           aggregates the 5/typed facts by design (operator/contracts).
#   checker           support-evidence checker (single concern).
#   checker-runner    profile load + dispatch (the check_profile god-checker).
#   checker-lib       checker helper sublayer.
#   path-gate         file-tree admission gate (check_package_path_admission).
#   connection        Agent-brain / projection connection surface.
#   recording         deterministic evidence/packet writer (one seam).
#   operator          Building operator mechanics (validate / project / route /
#                     orchestrate); any non-empty decomposition_target is a
#                     governance ceiling row, not authority.
#
# SUPPORT_FORBIDDEN_OWNERSHIP baseline (G5 re-encodes this, hand-written):
#   movement_author, target_selector, success_judge, quality_judge, route_invent

