# G6 decomposition ceiling: each decomposition_target's current owns_crossings
# count is its ceiling; raising owns_crossings above the ceiling -> G6 RED.
# PROOF LIMIT (codex review 4 P2-2, decision C 0601): this is a CURRENT-state
# self-consistency check, NOT an independently-enforced one-way ratchet — editing
# this ceiling upward in the same commit is not rejected here. The intent ("a
# decomposed module does not re-bloat") is enforced by G2 (owns<=1) + G1 + G4 +
# mag-0, not by G6 alone. "shrink-only" below is a HISTORICAL note (P3 actually
# moved each count down to 0), not a guaranteed mechanism.
decomposition_ceilings:
  - target: check-profile-god-0
    module: support/checkers/check_profile.py
    ceiling: 0          # P3a DONE: kernel-check bodies + rule/case runners + YAML parser lifted to checkers/lib/* (§D-4 Opt B); facade homes no crossing. lowered 11 -> 0 (historical).
  - target: rs-sink-ceiling-0
    module: support/operator/report_sinks.py
    ceiling: 1          # owns exactly the report_packet sink-dispatch seam; sink set re-ratified at FOUR (Smith 0611: local-inbox, operator-wake-local, slack, dashboard — live-pinned by the reporter_notification_projection kernel check); a 5th sink requires the report_bus + sinks/<name> split FIRST — never a 5th sibling (blueprint 3.1)

