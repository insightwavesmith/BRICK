    # checker-lib row above). This module is now the THIN FACADE (profile load +
    # validate, RULE_RUNNERS, run_kernel_check dispatch, self-test, CLI). It
    # homes NO crossing mechanics any more (owns_crossings shrank 11 -> 0; the
    # axis MOVEMENT_LITERALS import moved to lib/rule_runners). The G6 ceiling
    # lowered 11 -> 0 (historical; G6 is a self-consistency ceiling, see proof-limit).
    owns_crossings: []
    consumes_crossings: []
    imports_axis: []
