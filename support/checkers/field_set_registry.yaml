# E2 / S0 — AXIS FIELD-SET SINGLE-SOURCE REGISTRY (mirror-guard + scatter-guard source).
#
# One row per AXIS field-set that is ALREADY single-source on the CURRENT tree.
# check_axis_field_set_single_source.py AST-scans all of support/ and REDs if any
# module ENUMERATES a registered field-set (a frozenset / set / tuple literal, OR a
# whole @dataclass whose complete named-field set equals the registered member-set)
# anywhere EXCEPT its registered `defining_module` + `source_symbol`. Each registered
# field-set has exactly ONE defining_module (scatter-guard: a second definition is RED).
#
# GUARD-FIRST DISCIPLINE (E2 design §7 item 1, §8 S0 row): this registry holds ONLY
# field-sets whose member-set has exactly ONE enumeration on the tree today, so the
# guard is GREEN now and turns RED only on a NEW duplication/regression. Field-sets
# that are still mirrored in many places (Agent-object key-set, ref-fields, Brick-row,
# Link-row, work-envelope, AGENTS.md prose) are DELIBERATELY NOT registered yet — they
# get registered as later steps (S1-S12) collapse each mirror to a single source.
#
# WHAT IS *NOT* A MIRROR (never RED): a single-field-by-name read (e.g.
# `agent_object.get("preferred_adapter_ref")`) is an ordinary field access, not a
# field-SET enumeration. In particular the explicit-adapter fail-close invariant
# (selected_adapter_ref presence checks; design §3 / §7.1) reads the adapter field by
# name on purpose — it is an invariant, not a mirror. The guard REDs ONLY on a literal
# that enumerates the WHOLE registered member-set, never on a by-name read.

schema: field-set-registry/v1

field_sets:
  # CASTING field-set (Agent axis WHO-dials: which performer + which brain).
  # Single source today: the CASTING_FIELDS descriptor tuple in
  # support/operator/primitives.py — every consumer derives its names from this
  # tuple (NODE_CASTING_FIELDS, the Agent-object allowlist, the casting_bag/
  # stamp_casting transport helpers). The member-set below is the set of
  # CastingField.field_name values; it is enumerated as a literal NOWHERE else on
  # the tree (the contracts.py `AgentObjectContractData` scalars are interleaved
  # inside the FULL Agent-object field-list, not a standalone casting-only literal,
  # so they are not a member-set match — that mirror collapses to the bag in S7).
  - name: casting_fields
    defining_module: support/operator/primitives.py
    source_symbol: CASTING_FIELDS
    members:
      - preferred_adapter_ref
      - preferred_model_ref

  # WORK-ENVELOPE key-set (E2 / S2, mirror M7). The on-disk work-envelope.json
  # key-set the chat-session park seam validates is exactly the AgentAdapterRequest
  # field-set. Single source today: the @dataclass AgentAdapterRequest in
  # support/connection/agent_adapter.py — every named field there is a member, and
  # the dataclass IS the one enumeration (the guard's whole-@dataclass branch
  # whitelists it by name). check_building_lifecycle_path_shape.py now DERIVES
  # WORK_ENVELOPE_KEYS from this dataclass via dataclasses.fields() instead of a hand
  # literal, so this set is enumerated NOWHERE else on the tree. Re-adding a hand copy
  # (a 26-string frozenset, or a second @dataclass with these same fields) -> guard RED.
  - name: work_envelope_keys
    defining_module: support/connection/agent_adapter.py
    source_symbol: AgentAdapterRequest
    members:
      - building_id
      - agent_object_ref
      - adapter_ref
      - brick_instance_ref
      - next_brick_instance_ref
      - selected_model_ref
      - callable_ref
      - prompt_refs
      - skill_refs
      - hook_refs
      - tool_policy_refs
      - discipline_refs
      - input_packet_ref
      - output_packet_ref
      - work_statement
      - comparison_rule
      - required_return_shape
      - source_fact_bodies
      - link_handoff_refs
      - agent_instruction_packet
      - write_scope
      - building_session_ref
      - session_scope_ref
      - session_continuity_mode
      - proof_limits
      - not_proven

  # GATE-CONCEPT token field-set (Link axis plan grammar — E2 / S3, mirror M11).
  # The preset-declared ``gate_concept_profile`` concept tokens that TRANSLATE to a
  # live ``declared_gate_ref``. Single source today: the GATE_CONCEPT_TOKEN_GATE_REFS
  # Mapping in link/spec.py (the start of the Link single-source API). The S3 move
  # deleted composition.py's local copy + the inline translation copies; composition
  # and assembly now import the Link-owned translate_gate_concept reader, so this
  # concept-token member-set is enumerated NOWHERE else on the tree. The members
  # below are the translating gate-concept tokens (the keys of the Mapping);
  # re-enumerating them as a literal set/tuple/list anywhere under support/ -> RED.
  # NOTE (S3 scope): the guard's literal-detector covers set/tuple/list/frozenset
  # collections + whole-@dataclass field-sets; a dict-literal re-copy of the WHOLE
  # token->ref Mapping is a known guard-coverage gap (dict keys are not yet a
  # detected member-set) and is left for a later guard hardening, not S3.
  - name: gate_concept_token_gate_refs
    defining_module: link/spec.py
    source_symbol: GATE_CONCEPT_TOKEN_GATE_REFS
    members:
      - strict-evidence
      - coo-review
      - human-review

  # AGENT-OBJECT allowed-key field-set — DELIBERATELY NOT REGISTERED YET (S1 note).
  # E2 / S1 (mirror M8) removed native_dispatch.py's 3rd flat-literal copy of this
  # 12-key set (the one that OMITTED the casting keys and RAISED on a real role) by
  # importing primitives `_AGENT_OBJECT_ALLOWED_KEYS`. But the full member-set is still
  # enumerated elsewhere on the current tree, so it is NOT single-source yet and cannot
  # be registered under the S0 GUARD-FIRST rule (registry holds only sets that are green
  # NOW): contracts.py `AgentObjectContractData` is a whole-@dataclass mirror of exactly
  # these 12 fields (collapses to the opaque casting/ref bag in S7, mirror M1), and the
  # 6-name ref subset is still flat-enumerated in agent_resources.py `_REF_FIELDS`
  # alongside primitives `_AGENT_OBJECT_REF_FIELDS` (consolidates in S6/S7). This set
  # gets a registry row once those sibling mirrors collapse, per design §8.
